<title>Business AI – Study App</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#f3f7eb 0%,#e8f0d8 100%);min-height:100vh;color:#2a2a2a;padding:20px}
.container{max-width:760px;margin:0 auto}
header{text-align:center;padding:20px 0 18px}
h1{color:#4a7c2a;font-size:26px;margin-bottom:4px}
.subtitle{color:#777;font-size:13px;font-style:italic}
.mode-tabs{display:flex;gap:6px;margin-bottom:16px}
.mode-tab{flex:1;padding:10px 6px;border-radius:8px;border:1px solid #c5d4a8;background:#fff;color:#4a7c2a;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.mode-tab:hover{background:#f3f7eb}
.mode-tab.active{background:#4a7c2a;color:#fff;border-color:#4a7c2a}
.controls{background:#fff;border-radius:12px;padding:14px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.topic-buttons{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.topic-btn{padding:5px 10px;border:1px solid #c5d4a8;background:#fff;border-radius:6px;font-size:11px;cursor:pointer;color:#4a7c2a;transition:all .15s}
.topic-btn:hover{background:#f3f7eb}
.topic-btn.active{background:#4a7c2a;color:#fff;border-color:#4a7c2a}
.exam-settings{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.exam-settings label{font-size:12px;color:#555}
.exam-settings select,.exam-settings input[type=number]{padding:5px 8px;border:1px solid #c5d4a8;border-radius:6px;font-size:12px}
.btn-start{padding:8px 20px;background:#4a7c2a;color:#fff;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
.btn-start:hover{background:#3d6822}
.stats{font-size:13px;color:#555;text-align:right}
.stats span{font-weight:600;color:#4a7c2a}
.progress-bar{background:#fff;border-radius:999px;height:6px;overflow:hidden;margin-bottom:14px;box-shadow:inset 0 1px 2px rgba(0,0,0,.06)}
.progress-fill{height:100%;background:linear-gradient(90deg,#8bc34a,#4a7c2a);transition:width .3s;width:0%}
.card-area{perspective:1200px;margin-bottom:16px;min-height:300px;position:relative}
.card{background:#fff;border-radius:16px;padding:32px 28px;box-shadow:0 4px 20px rgba(0,0,0,.08);cursor:pointer;transition:transform .5s;transform-style:preserve-3d;min-height:300px;position:relative}
.card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;padding:32px 28px;display:flex;flex-direction:column;justify-content:center}
.card-back{transform:rotateY(180deg)}
.card-tag{display:inline-block;background:#e8f0d8;color:#4a7c2a;font-size:11px;padding:3px 9px;border-radius:4px;margin-bottom:12px;align-self:flex-start;font-weight:600}
.card-question{font-size:20px;font-weight:600;color:#2a2a2a;line-height:1.4;margin-bottom:10px}
.card-hint{font-size:12px;color:#999;font-style:italic;position:absolute;bottom:14px;left:28px;right:28px;text-align:center}
.card-answer{font-size:14px;line-height:1.55;color:#333}
.card-answer strong{color:#4a7c2a}
.nav-buttons{display:flex;gap:8px;margin-bottom:14px}
.nav-btn{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.nav-btn:disabled{opacity:.4;cursor:not-allowed}
.btn-prev,.btn-next{background:#fff;color:#4a7c2a;border:1px solid #c5d4a8}
.btn-prev:hover:not(:disabled),.btn-next:hover:not(:disabled){background:#f3f7eb}
.btn-flip{background:#4a7c2a;color:#fff}
.btn-flip:hover{background:#3d6822}
.difficulty-buttons{display:none;gap:8px;margin-top:10px}
.difficulty-buttons.visible{display:flex}
.diff-btn{flex:1;padding:8px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer}
.btn-hard{background:#f8d7da;color:#842029}
.btn-medium{background:#fff3cd;color:#664d03}
.btn-easy{background:#d1e7dd;color:#0f5132}
.exam-area{display:none}
.q-card{background:#fff;border-radius:12px;padding:20px 22px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.q-num{font-size:11px;font-weight:700;color:#4a7c2a;margin-bottom:4px}
.q-type{font-size:10px;color:#999;margin-bottom:8px}
.q-text{font-size:14px;font-weight:600;margin-bottom:12px;line-height:1.45}
.q-options label{display:block;padding:8px 12px;margin-bottom:5px;border:1px solid #e0e0e0;border-radius:6px;cursor:pointer;font-size:13px;transition:all .12s;line-height:1.4}
.q-options label:hover{background:#f9fdf5;border-color:#c5d4a8}
.q-options input{margin-right:8px}
.q-tf{display:flex;gap:8px}
.q-tf label{flex:1;text-align:center}
.q-concept textarea{width:100%;min-height:60px;border:1px solid #e0e0e0;border-radius:6px;padding:8px;font-size:13px;font-family:inherit;resize:vertical}
.q-calc input[type=text]{width:100%;border:1px solid #e0e0e0;border-radius:6px;padding:8px;font-size:13px;font-family:inherit}
.btn-submit{display:block;width:100%;padding:14px;background:#4a7c2a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin:20px 0}
.btn-submit:hover{background:#3d6822}
.result-card{padding:20px}
.result-card.correct{border-left:4px solid #2e7d32}
.result-card.incorrect{border-left:4px solid #c62828}
.result-card.manual{border-left:4px solid #f9a825}
.result-explanation{font-size:12px;color:#555;margin-top:8px;line-height:1.45}
.result-explanation strong{color:#2e7d32}
.score-box{background:#fff;border-radius:12px;padding:20px;text-align:center;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.score-big{font-size:44px;font-weight:800;color:#4a7c2a}
.score-label{font-size:13px;color:#777}
.btn-export{display:block;width:100%;padding:12px;background:#1565c0;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px}
.btn-export:hover{background:#0d47a1}
.btn-retry{display:block;width:100%;padding:12px;background:#fff;color:#4a7c2a;border:1px solid #c5d4a8;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.reset-link{text-align:center;padding:10px}
.reset-link a{color:#999;font-size:12px;cursor:pointer;text-decoration:underline}
.hidden{display:none!important}
</style>

<script>
const cards = [
{topic:"Intro",q:"What is AI according to the EU AI Act?",a:"A <strong>machine-based system</strong> designed to operate with varying levels of autonomy, that may exhibit adaptiveness after deployment, and infers from input how to generate outputs such as <strong>predictions, content, recommendations, or decisions</strong>."},
{topic:"Intro",q:"What is Machine Learning (ISO definition)?",a:"A process of <strong>optimizing model parameters through computational techniques</strong>, such that the model's behaviour reflects the <strong>data or experience</strong>."},
{topic:"Intro",q:"How does ML relate to AI?",a:"ML (mostly data-driven, grounded in <strong>induction</strong>) is the dominant paradigm of modern AI. AI also encompasses <strong>symbolic AI</strong> (deduction), <strong>causal AI</strong> (abduction), and meta-heuristic methods."},
{topic:"Intro",q:"What are the 3 main learning paradigms?",a:"<strong>Supervised Learning</strong> (labeled data), <strong>Unsupervised Learning</strong> (unlabeled data), <strong>Reinforcement Learning</strong> (learning from rewards/penalties)."},
{topic:"Intro",q:"List the 11 data processing steps in ML.",a:"1. Understand purpose, 2. Obtain dataset, 3. Explore/clean/preprocess, 4. Reduce dimensions, 5. Determine ML task, 6. Partition data, 7. Select methods, 8. Perform task (iterative), 9. Interpret results, 10. Deploy, 11. Iterate & maintain."},
{topic:"Intro",q:"What is Overfitting? What are its 3 causes?",a:"Model learns <strong>noise instead of patterns</strong>. Causes: <strong>(1)</strong> model complexity too high, <strong>(2)</strong> too many features, <strong>(3)</strong> insufficient training data."},
{topic:"Intro",q:"How do you detect and solve Overfitting?",a:"<strong>Detect:</strong> Cross-validation (train/validation/holdout split). <strong>Solve:</strong> Use simpler models, select predictors, collect more data."},
{topic:"Intro",q:"What are the 5 ethical principles in ML?",a:"<strong>Non-maleficence</strong> (avoiding harm), <strong>Fairness</strong>, <strong>Transparency</strong>, <strong>Accountability</strong>, <strong>Privacy</strong>."},
{topic:"Intro",q:"What is the Business AI brainstorm framework?",a:"Given an AI approach, ask: <strong>(1)</strong> What exactly is it? <strong>(2)</strong> Where can it be used? <strong>(3)</strong> Is it actually needed? <strong>(4)</strong> Why is it valuable? <strong>(5)</strong> What could go wrong? <strong>(6)</strong> Turn it into something real."},
{topic:"Data",q:"What is data vs. big data?",a:"<strong>Data:</strong> anything that can be recorded and processed. <strong>Big data:</strong> a relative term — data are 'big' compared with past methods/devices. Described by the <strong>Four V's</strong>."},
{topic:"Data",q:"What are the Four V's of Big Data?",a:"<strong>Volume</strong> (amount), <strong>Variety</strong> (types), <strong>Velocity</strong> (speed), <strong>Veracity</strong> (trustworthiness)."},
{topic:"Data",q:"What are the main data types?",a:"<strong>Structured</strong> (tabular): Numerical (continuous/discrete), Categorical (nominal/ordinal/binary), Time-series. <strong>Unstructured:</strong> easily interpreted by humans but not machines."},
{topic:"Data",q:"Name the 3 sampling methods.",a:"<strong>RaS</strong> (Random): every record equal chance. <strong>SyS</strong> (Systematic): every k-th record. <strong>StS</strong> (Stratified): divide into subgroups, sample from each."},
{topic:"Data",q:"Why oversample rare events?",a:"Rare events (e.g., fraud) are underrepresented. <strong>Oversampling</strong> the rare class enhances practical usefulness, especially when rare events carry <strong>high cost or value</strong>."},
{topic:"Data",q:"What is the Curse of Dimensionality?",a:"As input variables increase, required records grow <strong>exponentially</strong>. More variables → higher overfitting risk, less robust models."},
{topic:"Data",q:"What does PCA do?",a:"Transforms original correlated features into fewer <strong>uncorrelated principal components</strong> that capture most variability. Each Zi is a linear combination of the original variables."},
{topic:"Data",q:"How do you interpret PCA components?",a:"Examine <strong>signs of coefficients</strong>. Opposite signs suggest a trade-off dimension (e.g., health vs. taste). Same signs suggest a combined effect."},
{topic:"Data",q:"Difference: Standardization vs. Rescaling?",a:"<strong>Standardization:</strong> mean 0, std 1. <strong>Rescaling:</strong> transforms to range [a,b], typically [0,1]. Both equalize numerical influence of features."},
{topic:"Data",q:"How to handle missing values? (5 methods)",a:"<strong>Drop records</strong>, <strong>Drop columns</strong>, <strong>Fill with mean/median</strong>, <strong>Forward/backward fill</strong> (time-series), <strong>Linear interpolation</strong> (ordered numeric)."},
{topic:"Data",q:"Rules of thumb for data size?",a:"<strong>Prediction:</strong> ~10 records per predictor. <strong>Classification:</strong> [# classes × (6 × # predictors)] records."},
{topic:"TimeSeries",q:"What are the 4 components of a time series?",a:"<strong>Level</strong> (constant baseline), <strong>Trend</strong> (increase/decrease over time), <strong>Seasonality</strong> (short-term cyclical pattern), <strong>Noise</strong> (random variation)."},
{topic:"TimeSeries",q:"What is Autocorrelation?",a:"Correlation between a time series and its own <strong>lagged version</strong> (lag-k). Positive (lag-1): stickiness. Negative (lag-1): swings. Strong at lag-k>1: indicates <strong>seasonality</strong>."},
{topic:"TimeSeries",q:"When does autocorrelation suggest a random walk?",a:"When autocorrelation between Yt and Yt-1 is <strong>very high (close to 1)</strong>, the series may follow a random walk and is <strong>difficult to predict</strong>."},
{topic:"TimeSeries",q:"Model-based vs. Data-driven methods?",a:"<strong>Model-based:</strong> user specifies structure (regression, AR(p)) — more interpretable, less data. <strong>Data-driven:</strong> learns from data (smoothing, RNNs) — captures complex patterns, needs more data."},
{topic:"TimeSeries",q:"What trend types exist in regression?",a:"<strong>Linear trend</strong>, <strong>Exponential trend</strong> (LogTransformer + Trendforecaster), <strong>Polynomial trend</strong>."},
{topic:"TimeSeries",q:"Additive vs. Multiplicative Seasonality?",a:"<strong>Additive:</strong> seasonal effect constant regardless of level. <strong>Multiplicative:</strong> seasonal effect scales with the level."},
{topic:"TimeSeries",q:"What is AR(p)?",a:"<strong>Autoregression</strong> with p lagged terms: Yt = β0 + β1·Yt-1 + … + βp·Yt-p + ε. Often applied to <strong>residuals</strong> to capture temporal dependence."},
{topic:"TimeSeries",q:"Centered vs. Trailing Moving Average?",a:"<strong>Centered:</strong> averages w points around t — for <strong>smoothing/visualizing</strong>. <strong>Trailing:</strong> averages w points up to t — for <strong>forecasting</strong> (Ft+1 = MAt)."},
{topic:"TimeSeries",q:"How does Exponential Smoothing work?",a:"<strong>Ft+1 = αYt + α(1-α)Yt-1 + …</strong> Or: Ft+1 = Ft + α(Yt - Ft). Greater weight to recent data."},
{topic:"TimeSeries",q:"Holt's vs. Holt-Winter Smoothing?",a:"<strong>Holt's:</strong> captures local <strong>trend</strong> (Ft+k = Lt + kTt). <strong>Holt-Winter:</strong> captures both <strong>trend and seasonality</strong> (Ft+k = (Lt + kTt)·St+k-M)."},
{topic:"TimeSeries",q:"RNNs for time series — key points?",a:"Data reshaped into <strong>rolling windows</strong>. Simple RNNs have <strong>short-term memory</strong>. <strong>LSTM</strong> adds gating mechanisms. Data should be <strong>rescaled</strong> before training."},
{topic:"Classification",q:"Supervised vs. Unsupervised Learning?",a:"<strong>Supervised:</strong> learns from labeled data, optimizes accuracy. <strong>Unsupervised:</strong> finds hidden patterns in unlabeled data, interpretation essential."},
{topic:"Classification",q:"What are Propensities and Cutoff values?",a:"<strong>Propensities:</strong> estimated probabilities per class. <strong>Cutoff:</strong> threshold for classification. Two cutoffs can define a <strong>'grey area'</strong>."},
{topic:"Classification",q:"What is the Confusion Matrix?",a:"Table comparing predicted vs. actual classes: <strong>TP, TN, FP, FN</strong>. Basis for all classification metrics."},
{topic:"Classification",q:"Accuracy and Error Rate formulas?",a:"<strong>Accuracy</strong> = (TP+TN)/(TP+TN+FP+FN). <strong>Error Rate</strong> = 1 - Accuracy."},
{topic:"Classification",q:"Sensitivity (TPR) and Specificity (TNR)?",a:"<strong>Sensitivity</strong> = TP/(TP+FN). <strong>Specificity</strong> = TN/(TN+FP). Both based on <strong>ground truth</strong>."},
{topic:"Classification",q:"Precision, Recall, and F1-Score?",a:"<strong>Precision</strong> = TP/(TP+FP). <strong>Recall</strong> = TP/(TP+FN). <strong>F1</strong> = 2×Precision×Recall/(Precision+Recall). Based on <strong>predictions</strong>."},
{topic:"Classification",q:"What is the ROC curve and AUC?",a:"<strong>ROC</strong> plots TPR vs. FPR across cutoffs. <strong>AUC > 0.5</strong> = better than chance. AUC = 1.0 = perfect."},
{topic:"Classification",q:"How does K-NN work?",a:"Classifies by <strong>majority class among k nearest neighbors</strong>. Uses Euclidean distance. Requires <strong>standardization</strong>. Small k → overfitting, large k → underfitting."},
{topic:"Classification",q:"K-NN voting: Equal-weight vs. Distance-weighted?",a:"<strong>Equal:</strong> wi=1/k. <strong>Distance-weighted:</strong> wi = (1/di)/Σ(1/dj). Closer neighbors get higher influence."},
{topic:"Classification",q:"What does Logistic Regression model?",a:"Models <strong>log odds</strong> as linear function: log(p/(1-p)) = β0 + β1x1 + … Produces propensities 0-1. Needs <strong>cutoff</strong> for classification. e^βk = odds ratio."},
{topic:"Classification",q:"How to extend Logistic Regression to multiple classes?",a:"<strong>Nominal:</strong> K-1 models, each class gets own coefficients. <strong>Ordinal:</strong> 1 model, shared predictor coefficients across classes."},
{topic:"Classification",q:"How does a Classification Tree work?",a:"Recursively partitions data to form <strong>homogeneous subgroups</strong>. Splits maximize <strong>impurity reduction</strong> (Gini or Entropy). No normalization needed."},
{topic:"Classification",q:"Gini Index vs. Entropy?",a:"<strong>Gini:</strong> 1 - Σpk². <strong>Entropy:</strong> -Σpk·log₂(pk). Both measure class mixing. Lower = purer."},
{topic:"Classification",q:"Classification Tree challenges?",a:"<strong>Instability:</strong> structure varies across training sets. <strong>Overfitting:</strong> fully grown trees fit noise. Solutions: Random Forest, max depth, min samples, cross-validation."},
{topic:"Classification",q:"What is V-fold Cross-Validation?",a:"Partition data into V folds. Each fold = test set once. Average V scores for final estimate. Provides <strong>more stable</strong> evaluation."},
{topic:"Prediction",q:"Explanatory vs. Predictive Modeling?",a:"<strong>Explanatory:</strong> full dataset, understand relationships. <strong>Predictive:</strong> train/holdout split, predict unseen data accurately."},
{topic:"Prediction",q:"List the prediction error metrics.",a:"<strong>ME</strong> (bias), <strong>MAE</strong> (avg error), <strong>MPE</strong> (scaled bias), <strong>MAPE</strong> (scaled error), <strong>RMSE</strong> (penalizes large errors)."},
{topic:"Prediction",q:"What do Cumulative Gains and Lift Charts show?",a:"<strong>Gains:</strong> cumulative actual value vs. records (above diagonal = better than random). <strong>Lift:</strong> decile average / global average."},
{topic:"Prediction",q:"Multiple Linear Regression: key assumptions?",a:"<strong>(1) Linearity</strong>, <strong>(2) Independence</strong>, <strong>(3) Homoscedasticity</strong>, <strong>(4) Normality</strong> of errors. In predictive modeling, accuracy matters more."},
{topic:"Prediction",q:"Variable selection: 3 approaches?",a:"<strong>(1) Exhaustive search</strong>, <strong>(2) Subset search</strong> (forward/backward/stepwise), <strong>(3) Regularization</strong> (Lasso/Ridge/Elastic Net). Criteria: R²adj, AIC, BIC."},
{topic:"Prediction",q:"Lasso vs. Ridge vs. Elastic Net?",a:"<strong>Lasso (L1):</strong> sets coefficients to 0 → variable selection. <strong>Ridge (L2):</strong> shrinks but keeps all. <strong>Elastic Net:</strong> combines both. Data must be <strong>standardized</strong>."},
{topic:"Prediction",q:"Regression Tree vs. Classification Tree?",a:"<strong>Prediction:</strong> mean in terminal node. <strong>Impurity:</strong> node-specific SSE. <strong>Evaluation:</strong> ME, MAE, RMSE, Gains/Lift."},
{topic:"Prediction",q:"Random Forest vs. Boosted Trees?",a:"<strong>RF:</strong> parallel trees on bootstrap samples + random features. <strong>Boosted:</strong> sequential, each corrects previous errors with learning rate."},
{topic:"Prediction",q:"Feature Importance in ensemble trees?",a:"Sum <strong>impurity reductions per feature across all trees</strong>, then normalize to sum to 1."},
{topic:"Prediction",q:"Regression Trees: Pros and Cons?",a:"<strong>Pros:</strong> no normalization, auto variable selection, no functional form assumptions, transparent. <strong>Cons:</strong> expensive, biased to high-cardinality features, unstable, hard interactions."},
{topic:"Clustering",q:"What is Cluster Analysis?",a:"Forms groups of <strong>similar records</strong>. Goal: <strong>minimize within-cluster distances, maximize between-cluster distances</strong>. Requires standardization."},
{topic:"Clustering",q:"Distance measures for numerical variables?",a:"<strong>Euclidean:</strong> √Σ(xi-yi)². <strong>Manhattan:</strong> Σ|xi-yi|. <strong>Correlation-based:</strong> 1-rij. <strong>Mahalanobis:</strong> accounts for covariance."},
{topic:"Clustering",q:"Distance measures for categorical variables?",a:"<strong>Matching:</strong> (a+d)/p (all matches). <strong>Jaccard:</strong> d/(b+c+d) (ignores joint zeros)."},
{topic:"Clustering",q:"What is Gower's Similarity?",a:"For <strong>mixed variables</strong>. Auto-normalizes numeric. sij = Σ(δijm·sijm)/Σ(δijm), δ=1 if both values valid."},
{topic:"Clustering",q:"How does K-means work (4 steps)?",a:"<strong>1.</strong> Choose K centroids. <strong>2.</strong> Assign to nearest. <strong>3.</strong> Update centroids as means. <strong>4.</strong> Repeat until convergence."},
{topic:"Clustering",q:"What is an Elbow Plot?",a:"Plots <strong>within-cluster dispersion vs. K</strong>. Elbow = diminishing returns. A proper K gives <strong>meaningful and compact</strong> structure."},
{topic:"Clustering",q:"Agglomerative Hierarchical Clustering?",a:"<strong>1.</strong> Each record = cluster. <strong>2.</strong> Merge two closest (linkage rule). <strong>3.</strong> Continue until one remains → dendrogram. <strong>4.</strong> Cut at desired distance."},
{topic:"Clustering",q:"4 linkage rules?",a:"<strong>Single:</strong> min distance (chains). <strong>Complete:</strong> max distance (compact). <strong>Average:</strong> mean pairwise (balanced). <strong>Centroid:</strong> centroid distance."},
{topic:"Clustering",q:"What is Ward's Method?",a:"Merge pair causing <strong>smallest increase in total within-cluster ESS</strong>. Similar objective to K-means."},
{topic:"Clustering",q:"How to validate clusters?",a:"<strong>Interpretability:</strong> meaningful names. <strong>Stability:</strong> subset test. <strong>Separation:</strong> large between-cluster distances."},
{topic:"Clustering",q:"K-means vs. Hierarchical?",a:"<strong>K-means:</strong> fast, needs K, spherical assumption. <strong>Hierarchical:</strong> flexible, no pre-K, but expensive, permanent merges."},
{topic:"RL",q:"What is Reinforcement Learning?",a:"Agent learns by <strong>interacting with environment</strong>, receiving <strong>rewards/penalties</strong>, optimizing future performance. Continuous, adaptive."},
{topic:"RL",q:"RL vs. Supervised vs. Unsupervised?",a:"<strong>Supervised:</strong> passive labeled data. <strong>Unsupervised:</strong> passive unlabeled. <strong>RL:</strong> active experimentation, learns through feedback."},
{topic:"RL",q:"Exploration vs. Exploitation?",a:"<strong>Exploration:</strong> try unknown actions (learning). <strong>Exploitation:</strong> choose best known action (optimization). Core MAB trade-off."},
{topic:"RL",q:"What is Multi-Armed Bandit (MAB)?",a:"Dynamic self-optimizing: players assigned to arms using <strong>adaptive probabilities</strong> based on rewards. <strong>Continuous learning</strong>, no fixed final answer."},
{topic:"RL",q:"MAB policies from slides?",a:"<strong>Epsilon-First</strong>, <strong>Epsilon-Greedy</strong>, <strong>Decaying ε-Greedy</strong>, <strong>UCB</strong> (avg reward + uncertainty c√(lnN/Ni))."},
{topic:"RL",q:"What are Contextual Bandits?",a:"Extend MABs with <strong>context features</strong>. Different contexts → different optimal actions. Handles <strong>heterogeneity</strong>."},
{topic:"RL",q:"What is a Markov Decision Process (MDP)?",a:"<strong>States, Actions, Rewards, Transition Probabilities, Value Function, Policy</strong>. <strong>Markov Property:</strong> future depends only on current state + action."},
{topic:"RL",q:"MDP Key Elements (inventory example)?",a:"<strong>State:</strong> inventory level. <strong>Action:</strong> order quantity. <strong>Reward:</strong> profit. <strong>Transition:</strong> next inventory depends on stock+order+demand. <strong>Value:</strong> expected long-term profit. <strong>Policy:</strong> action-selection rule."},
{topic:"RL",q:"MDP Limitations?",a:"<strong>Complexity, Partial observability, Reward hacking</strong>. Human Compatible Critique: AI must assume uncertainty about human values."},
{topic:"NeuralNet",q:"What are Neural Networks?",a:"ML models capturing <strong>non-linear, high-dimensional, complex relationships</strong>. Learn relationship directly from data, unlike parametric models."},
{topic:"NeuralNet",q:"MLP Architecture?",a:"<strong>Input Layer → Hidden Layers → Output Layer</strong>. Feedforward (no loops). Typically fully connected."},
{topic:"NeuralNet",q:"What does each neuron compute?",a:"<strong>Weighted sum:</strong> zj = θj + Σwij·xi. <strong>Activation:</strong> aj = g(zj). Nonlinear transformation."},
{topic:"NeuralNet",q:"Activation functions by layer?",a:"<strong>Hidden:</strong> ReLU max(0,z). <strong>Binary output:</strong> Sigmoid 1/(1+e^-z). <strong>Multi-class:</strong> Softmax. <strong>Continuous:</strong> Identity g(z)=z."},
{topic:"NeuralNet",q:"What is Backpropagation?",a:"Updates weights <strong>layer-by-layer backward</strong> via gradient descent: w_new = w_old - l·(∂L/∂w). l = learning rate."},
{topic:"NeuralNet",q:"SGD vs. Full-batch?",a:"<strong>SGD:</strong> updates per record/mini-batch — noisier, escapes local minima, faster. <strong>Full-batch:</strong> entire dataset — smoother, slower."},
{topic:"NeuralNet",q:"Epoch and Stopping Criteria?",a:"<strong>Epoch:</strong> one full pass. <strong>Stop:</strong> convergence, loss threshold, max iterations, or <strong>Early Stopping</strong> (validation loss rises)."},
{topic:"NeuralNet",q:"How to prevent NN overfitting?",a:"<strong>Validation loss monitoring, Early Stopping, max iterations, Cross-validation</strong>."},
{topic:"NeuralNet",q:"Sensitivity Analysis for NNs?",a:"<strong>1.</strong> All predictors at mean → baseline. <strong>2.</strong> Each predictor to min/max. <strong>3.</strong> Compare predictions → identify influential predictors."},
{topic:"DeepLearning",q:"What is Deep Learning?",a:"NNs with <strong>more layers, parameters, sophisticated structures</strong>. Learns hierarchical features. Needs large data and <strong>GPUs</strong>."},
{topic:"DeepLearning",q:"How does a CNN work?",a:"<strong>Convolutional layers</strong> with filters detect local features. Stacking → <strong>feature hierarchy</strong> (pixels→shapes→objects). Pooling + fully connected layers."},
{topic:"DeepLearning",q:"CNN processing steps?",a:"<strong>1.</strong> Convolution. <strong>2.</strong> Feature maps. <strong>3.</strong> Deep hierarchy. <strong>4.</strong> Pooling. <strong>5.</strong> Fully connected layer."},
{topic:"DeepLearning",q:"Key DL architectures?",a:"<strong>MLP, CNN, RNN, LSTM, Autoencoder, Transformer, GAN</strong>."},
{topic:"DeepLearning",q:"NN Strengths and Limitations?",a:"<strong>+:</strong> complex patterns, unstructured data, scales. <strong>-:</strong> black box, needs large data, normalization, overfitting, expensive."},
{topic:"GenAI",q:"What is Generative AI?",a:"Uses deep learning to <strong>synthesize new content</strong> based on learned probability distributions from vast datasets."},
{topic:"GenAI",q:"Discriminative vs. Generative AI?",a:"<strong>Discriminative:</strong> labels existing data. <strong>Generative:</strong> produces <strong>novel outputs</strong> (text, images, audio, video)."},
{topic:"GenAI",q:"Milestones of Generative Modeling?",a:"<strong>Autoencoder → GAN → Diffusion Models → Multimodal AI</strong>."},
{topic:"GenAI",q:"What are Foundation LLMs?",a:"Pre-trained on <strong>massive web data</strong>. Generate token sequences via <strong>shared embedding space</strong>. Used via prompts."},
{topic:"GenAI",q:"LLM Limitations?",a:"<strong>Hallucinations</strong> (plausible but false), <strong>Stochastic</strong> outputs, <strong>Static knowledge</strong>, <strong>Black box</strong>."},
{topic:"GenAI",q:"Fine-Tuning vs. RAG?",a:"<strong>Fine-tuning:</strong> train on domain data, high cost, static. <strong>RAG:</strong> retrieve external knowledge at inference, dynamic, transparent. <strong>Hybrid</strong> combines both."},
{topic:"GenAI",q:"4 ways to use Gen-AI?",a:"<strong>Database:</strong> don't — predicts not retrieves. <strong>Search:</strong> verify. <strong>Assistant:</strong> structured prompts. <strong>Agent:</strong> autonomous, needs guardrails."},
{topic:"GenAI",q:"Prompt Engineering structure?",a:"<strong>Role, Task, Context, Reasoning Steps</strong> (CoT), <strong>Output Format, Examples</strong> (zero/one/few-shot), <strong>Guardrails</strong> (positive)."},
{topic:"GenAI",q:"Skill vs. Prompt?",a:"<strong>Prompt:</strong> one-time instruction. <strong>Skill:</strong> reusable capability across conversations, discoverable by the agent."},
{topic:"GenAI",q:"Prompt types by task?",a:"<strong>Strategic:</strong> richer context. <strong>Analytical:</strong> formulas, validation. <strong>Operational:</strong> timelines, KPIs. <strong>Creative:</strong> stylistic cues. <strong>Technical:</strong> exact specs."},
{topic:"RDS",q:"What is Responsible Data Science?",a:"Holistic methodology optimizing for <strong>accuracy AND ethical, legal, societal implications</strong>."},
{topic:"RDS",q:"The 5 RDS Principles?",a:"<strong>(1) Non-Maleficence, (2) Fairness, (3) Transparency, (4) Accountability, (5) Privacy</strong>."},
{topic:"RDS",q:"3 types of AI harms from slides?",a:"<strong>Misaligned Incentives</strong> (social media), <strong>Disparate Error Rates</strong> (COMPAS), <strong>Proxy Discrimination</strong> (Optum healthcare cost)."},
{topic:"RDS",q:"What is Proxy Discrimination?",a:"After removing sensitive attributes, model uses <strong>proxy variables</strong> (zip code, cost) that reconstruct bias."},
{topic:"RDS",q:"What is the Mosaic Effect?",a:"Harmless data in isolation becomes <strong>dangerous when aggregated</strong>. Anonymized data re-identifiable via combination."},
{topic:"RDS",q:"RDS Framework: 5 phases?",a:"<strong>(1) Justification</strong> → Impact Statement. <strong>(2) Assembly</strong> → Datasheets. <strong>(3) Data Prep</strong> → Datasheets. <strong>(4) Modeling</strong> → Model Cards. <strong>(5) Auditing</strong> → Audit Reports."},
{topic:"RDS",q:"GDPR and EU AI Act?",a:"<strong>GDPR:</strong> individual data rights, protection from automated decisions. <strong>EU AI Act:</strong> <strong>risk-based approach</strong>, stricter for higher-risk."},
{topic:"RDS",q:"COMPAS Case?",a:"Similar overall accuracy but <strong>higher FPR for African-Americans</strong>, <strong>higher FNR for White defendants</strong>. Mathematically impossible to equalize all metrics when base rates differ."},
{topic:"RDS",q:"Bias mitigation strategies?",a:"<strong>Fix input:</strong> re-sampling, re-weighting, suppression. <strong>Fix model:</strong> structural changes. <strong>Fix output:</strong> threshold adjustment per group."},
{topic:"RDS",q:"Why principles ≠ checklists?",a:"Principles are <strong>guiding values involving trade-offs</strong>. Must be balanced per context/risk. E.g., zero false negatives in cancer → more false positives."},

{topic:"RL",type:"CONCEPT",calc:false,q:"Distinguish MAB, Contextual Bandit, MDP.",answer:"MAB: one best action, homogeneous (e.g., best ad, no user info). Contextual: per-context optimal action, static (e.g., personalized recs). MDP: actions affect future states, sequential (e.g., inventory reordering)."},
{topic:"RL",type:"SC",calc:false,q:"Contextual Bandits extend MABs by:",opts:["Removing exploration","Conditioning on context features","Making arms equal","Using NNs"],correct:1,explanation:"Incorporate context (user, time, device)."},
{topic:"RL",type:"TF",calc:false,q:"Epsilon-greedy: explore with ε, exploit with 1-ε.",correct:true,explanation:"Standard epsilon-greedy definition."},
{topic:"RL",type:"SC",calc:false,q:"UCB selects based on:",opts:["Random chance","Avg reward + uncertainty term","Most tries","Newest action"],correct:1,explanation:"UCB: avg reward + c√(lnN/Ni)."},
{topic:"RL",type:"TF",calc:false,q:"MDP value function = expected cumulative future reward discounted by γ.",correct:true,explanation:"V(s,a) with discount factor γ."},
{topic:"RL",type:"CONCEPT",calc:false,q:"3 MDP limitations?",answer:"Complexity (define all states/actions/rewards). Partial observability (true states hidden). Reward hacking (optimize metric not objective). Human Compatible: AI must assume uncertainty about human values."},
{topic:"RL",type:"SC",calc:false,q:"Human Compatible Critique says:",opts:["Maximize any reward","Humans specify perfect objectives","AI must assume uncertainty about human values","RL is always superior"],correct:2,explanation:"Humans can't specify perfect objectives."},

{topic:"NeuralNet",type:"CALC",calc:true,q:"Inputs a1=0.20,a2=0.90. Weights w1,3=0.050,w2,3=0.010. Bias θ3=-0.300. Calculate z3 and a3 (sigmoid).",answer:"z3=0.050×0.20+0.010×0.90-0.300=-0.281. a3=1/(1+e^0.281)=1/2.324≈0.430.",explanation:"Weighted sum+bias, then sigmoid."},

// CASE STUDY style: Classification with business cost
{topic:"Classification",type:"CALC",calc:true,q:"CASE: Fraud detection on 200 transactions. TP=10, FN=5, TN=170, FP=15. (a) Calculate Accuracy. (b) Calculate Precision. (c) Missing fraud costs €500, false alarm costs €10. Calculate total financial cost of errors.",answer:"(a) Accuracy = (10+170)/200 = 180/200 = 0.90 (90%). (b) Precision = TP/(TP+FP) = 10/(10+15) = 10/25 = 0.40 (40%). (c) Cost = FN×500 + FP×10 = 5×500 + 15×10 = 2500 + 150 = €2,650.",explanation:"Apply confusion matrix formulas. Business cost = sum of (error count × unit cost per error type)."},
{topic:"Classification",type:"CALC",calc:true,q:"CASE: Fraud model: TP=10,FN=5,TN=170,FP=15. Calculate Sensitivity (Recall) and Specificity.",answer:"Sensitivity = TP/(TP+FN) = 10/(10+5) = 10/15 = 0.67 (67%). Specificity = TN/(TN+FP) = 170/(170+15) = 170/185 = 0.92 (92%).",explanation:"Sensitivity: how many actual frauds caught. Specificity: how many legitimate correctly identified."},
// CASE STUDY style: Clustering with standardization + linkage
{topic:"Clustering",type:"CALC",calc:true,q:"CASE: Customer A (Age=40, Spending=45000), Customer B (Age=55, Spending=65000). Age: mean=30, std=5. Spending: mean=20000, std=5000. (a) Standardize both customers. (b) Calculate Euclidean distance.",answer:"(a) A_std: Age=(40-30)/5=2.0, Spend=(45000-20000)/5000=5.0. B_std: Age=(55-30)/5=5.0, Spend=(65000-20000)/5000=9.0. (b) d=√((2-5)²+(5-9)²)=√(9+16)=√25=5.0.",explanation:"Always standardize before computing distances. z=(x-mean)/std."},
{topic:"Clustering",type:"CALC",calc:true,q:"CASE: After standardizing — A=(2,5), B=(5,9), C=(-1,-1). Cluster1={A}, Cluster2={B,C}. d(A,B)=5.0, d(A,C)=√((2+1)²+(5+1)²)=√(9+36)=√45≈6.71. What is single linkage and complete linkage between Clusters 1 and 2?",answer:"Single linkage = min(d(A,B), d(A,C)) = min(5.0, 6.71) = 5.0. Complete linkage = max(d(A,B), d(A,C)) = max(5.0, 6.71) = 6.71.",explanation:"Single = minimum cross-cluster distance. Complete = maximum cross-cluster distance."},
// CASE STUDY style: Time Series with AR(1) residuals
{topic:"TimeSeries",type:"CALC",calc:true,q:"CASE: Model A (Trend+Seasonality) forecasts €200,000 for month t+1. Residual model: Ê(t+1)=0.5·Et. In month t, actual sales were €10,000 lower than predicted (Et=-10,000). Calculate final forecast.",answer:"Ê(t+1) = 0.5 × (-10,000) = -5,000. Final Forecast = Model A forecast + Residual forecast = 200,000 + (-5,000) = €195,000.",explanation:"Combine base model prediction with AR(1) residual correction."},
{topic:"TimeSeries",type:"CONCEPT",calc:false,q:"CASE: ACF of monthly sales shows significant negative spike at Lag 6. What sales pattern does this indicate? Why does it make business sense for a winter sports retailer?",answer:"A significant spike at Lag 6 in monthly data indicates seasonality with a period of 12 months (6 months = half cycle, negative because high season and low season are 6 months apart). For a winter sports retailer: sales peak in winter (Nov-Feb) and drop in summer (May-Aug) — exactly 6 months apart, creating negative autocorrelation at Lag 6."},
{topic:"TimeSeries",type:"CONCEPT",calc:false,q:"Why must time series data be split chronologically (e.g., first 4 years=training, last 1 year=holdout) rather than using random sampling?",answer:"Random sampling would cause data leakage — the model could learn from future data points that appear in the training set, leading to overly optimistic performance estimates. Time series have temporal dependencies, so the holdout must consist of future data only to simulate real forecasting conditions."},
// Additional concept checks matching exam style
{topic:"RL",type:"CONCEPT",calc:false,q:"Explain the trade-off between Exploration and Exploitation in the Multi-Armed Bandit problem. Why is pure exploitation a bad strategy?",answer:"Exploration: try less-known actions to discover potentially better rewards. Exploitation: choose the action currently known to perform best. Pure exploitation is bad because the agent may converge on a suboptimal action — without exploration, it never discovers that other arms might yield higher rewards. The agent gets stuck on a locally good but globally suboptimal choice."},
{topic:"GenAI",type:"CONCEPT",calc:false,q:"Explain the difference between Fine-Tuning and RAG when adapting an LLM. Which is better for accessing real-time company data?",answer:"Fine-Tuning: further train the LLM on domain-specific data to adjust its parameters — learns domain vocabulary, style, and logic. Static: requires retraining for updates. RAG: retrieve relevant external documents at inference time — the LLM generates answers based on retrieved content. Dynamic: can access up-to-date information. RAG is better for real-time company data because it dynamically retrieves current documents without retraining."},

{topic:"TimeSeries",type:"SC",calc:false,q:"Which is NOT a component of time series decomposition?",opts:["Level","Trend","Correlation","Seasonality"],correct:2,explanation:"The 4 components are Level, Trend, Seasonality, Noise. Correlation is not a component."},
{topic:"TimeSeries",type:"SC",calc:false,q:"A Deseasonalizer in regression modeling handles:",opts:["Noise removal","Trend estimation","Additive or multiplicative seasonality","Missing values"],correct:2,explanation:"The Deseasonalizer models seasonal patterns (additive or multiplicative)."},
{topic:"TimeSeries",type:"TF",calc:false,q:"Exponential smoothing gives equal weight to all historical observations.",correct:false,explanation:"Exponential smoothing gives exponentially DECREASING weight to older observations."},
{topic:"TimeSeries",type:"SC",calc:false,q:"Positive autocorrelation at lag-1 suggests:",opts:["Random behavior","Stickiness — high values tend to follow high values","Strong seasonality","The series is decreasing"],correct:1,explanation:"Positive lag-1 autocorrelation = stickiness (similar consecutive values)."},
{topic:"TimeSeries",type:"TF",calc:false,q:"In multiplicative seasonality, the seasonal effect scales with the level of the series.",correct:true,explanation:"Multiplicative: seasonal fluctuations grow/shrink proportionally with the series level."},
{topic:"TimeSeries",type:"SC",calc:false,q:"The smoothing parameter α in exponential smoothing controls:",opts:["The number of past observations used","The weight given to the most recent observation vs. history","The seasonal period length","The trend direction"],correct:1,explanation:"Higher α gives more weight to recent data; lower α gives more weight to history."},
{topic:"TimeSeries",type:"MC",calc:false,q:"Which statements about RNNs for time series are TRUE?",opts:["Data must be reshaped into rolling windows","Simple RNNs suffer from short-term memory","LSTMs add gating mechanisms to handle long dependencies","RNNs do not require data rescaling"],correct:[0,1,2],explanation:"RNNs DO require rescaling (e.g., [0,1]) before training."},
{topic:"TimeSeries",type:"SC",calc:false,q:"Polynomial trend in time series forecasting uses:",opts:["PolynomialTrendForecaster","LogTransformer","Deseasonalizer","AR(p) model"],correct:0,explanation:"PolynomialTrendForecaster handles polynomial (nonlinear) trends."},
{topic:"TimeSeries",type:"CALC",calc:true,q:"Naïve forecast: Y4=180, Y5=195. What is F6 using naïve method?",answer:"F6 = Y5 = 195. The naïve forecast simply uses the most recent observation.",explanation:"Naïve: Ft+1 = Yt."},
{topic:"TimeSeries",type:"CALC",calc:true,q:"Holt's smoothing: Lt=500, Tt=20. Forecast 3 periods ahead (F(t+3)).",answer:"F(t+3) = Lt + 3×Tt = 500 + 3×20 = 560.",explanation:"Holt's: Ft+k = Lt + k·Tt."},
// CLASSIFICATION EXTRA
{topic:"Classification",type:"SC",calc:false,q:"A 'grey area' in classification is defined by:",opts:["Setting a single cutoff value","Setting two cutoff values creating an undecided zone","Removing all uncertain records","Using random assignment"],correct:1,explanation:"Two cutoffs create a range where the model doesn't assign a clear class — the 'grey area'."},
{topic:"Classification",type:"SC",calc:false,q:"The F1-Score is the:",opts:["Average of sensitivity and specificity","Harmonic mean of precision and recall","Geometric mean of accuracy and error rate","Sum of TP and TN"],correct:1,explanation:"F1 = 2×Precision×Recall/(Precision+Recall) — the harmonic mean."},
{topic:"Classification",type:"TF",calc:false,q:"Accuracy can be misleading when class importance is unequal.",correct:true,explanation:"E.g., 99% accuracy in fraud detection could mean catching 0% of frauds if fraud is rare."},
{topic:"Classification",type:"SC",calc:false,q:"In K-NN, choosing a very large k leads to:",opts:["Overfitting","Underfitting — overly smooth boundaries","Perfect accuracy","Faster computation"],correct:1,explanation:"Large k = too smooth decision boundaries, ignoring local patterns (underfitting)."},
{topic:"Classification",type:"MC",calc:false,q:"Which statements about logistic regression are TRUE?",opts:["It models log odds as a linear function","It produces propensities between 0 and 1","It can only handle binary classification","e^βk represents the odds ratio per unit increase"],correct:[0,1,3],explanation:"Logistic regression can be extended to multinomial and ordinal — not only binary."},
{topic:"Classification",type:"SC",calc:false,q:"Entropy of a node with all records in one class equals:",opts:["1","0","0.5","Infinity"],correct:1,explanation:"Pure node: pk=1 for one class, so -1·log₂(1)=0. Maximum purity = zero entropy."},
{topic:"Classification",type:"TF",calc:false,q:"V-fold cross-validation uses each fold exactly once as the test set.",correct:true,explanation:"Each of V folds serves as test set once; the remaining V-1 folds are training data."},
{topic:"Classification",type:"SC",calc:false,q:"Sensitivity is also known as:",opts:["True Negative Rate","Precision","Recall / True Positive Rate","Specificity"],correct:2,explanation:"Sensitivity = Recall = TPR = TP/(TP+FN)."},
{topic:"Classification",type:"TF",calc:false,q:"In K-NN, categorical predictors can be used directly without conversion.",correct:false,explanation:"K-NN uses distance metrics requiring numerical input — categorical predictors must be converted to dummies."},
{topic:"Classification",type:"SC",calc:false,q:"A misclassification cost matrix is used to:",opts:["Calculate R² values","Weight different types of errors by their business impact","Measure model complexity","Select the number of hidden layers"],correct:1,explanation:"Cost matrix assigns different costs to FP and FN based on business consequences."},
{topic:"Classification",type:"CALC",calc:true,q:"CASE: Email spam filter. TP=80, FP=20, FN=10, TN=890. Calculate Accuracy and F1-Score.",answer:"Accuracy=(80+890)/1000=0.97. Precision=80/(80+20)=0.80. Recall=80/(80+10)=0.889. F1=2×0.80×0.889/(0.80+0.889)=1.422/1.689≈0.84.",explanation:"Apply formulas step by step."},
{topic:"Classification",type:"CALC",calc:true,q:"K-NN: New point at (3,4). Neighbor A at (1,2) class=Yes, B at (4,5) class=No, C at (2,3) class=Yes. k=3 equal-weight. What is the classification?",answer:"d(A)=√((3-1)²+(4-2)²)=√8≈2.83. d(B)=√((3-4)²+(4-5)²)=√2≈1.41. d(C)=√((3-2)²+(4-3)²)=√2≈1.41. Equal-weight vote: Yes=2, No=1 → Classification: Yes.",explanation:"Majority vote among k=3 nearest neighbors."},
// PREDICTION EXTRA
{topic:"Prediction",type:"SC",calc:false,q:"R²adj differs from R² because it:",opts:["Always increases with more predictors","Penalizes for the number of predictors","Ignores model complexity","Is always higher than R²"],correct:1,explanation:"R²adj penalizes for adding predictors that don't improve the model substantially."},
{topic:"Prediction",type:"TF",calc:false,q:"MAPE expresses prediction error as a percentage of actual values.",correct:true,explanation:"MAPE = mean(|ei/yi|)×100 — a percentage-scaled error metric."},
{topic:"Prediction",type:"SC",calc:false,q:"AIC and BIC are used to:",opts:["Measure classification accuracy","Compare models balancing fit and complexity","Calculate distances between clusters","Determine the learning rate"],correct:1,explanation:"AIC/BIC balance goodness-of-fit (SSE) with a penalty for model complexity."},
{topic:"Prediction",type:"MC",calc:false,q:"Which statements about regularization are TRUE?",opts:["Lasso can zero out coefficients","Ridge keeps all variables but shrinks coefficients","Data must be standardized before regularization","Elastic Net uses only L1 penalty"],correct:[0,1,2],explanation:"Elastic Net combines L1 AND L2 penalties — not just L1."},
{topic:"Prediction",type:"TF",calc:false,q:"In a gains chart, a model that performs no better than random follows the diagonal line.",correct:true,explanation:"The diagonal represents random selection — any model should curve above it."},
{topic:"Prediction",type:"SC",calc:false,q:"Backward elimination starts with:",opts:["No predictors, adding one at a time","All predictors, removing the least significant","A random subset","Only the best single predictor"],correct:1,explanation:"Backward: start with all, remove least useful one by one."},
{topic:"Prediction",type:"SC",calc:false,q:"Homoscedasticity in linear regression means:",opts:["Errors are normally distributed","Error variance is constant across predicted values","Predictors are uncorrelated","The model is linear"],correct:1,explanation:"Homoscedasticity: constant error variance across all levels of prediction."},
{topic:"Prediction",type:"TF",calc:false,q:"RMSE is always greater than or equal to MAE.",correct:true,explanation:"Squaring errors before averaging (RMSE) gives more weight to large errors → RMSE ≥ MAE."},
{topic:"Prediction",type:"SC",calc:false,q:"Random Forest reduces overfitting compared to a single tree by:",opts:["Using only one feature","Averaging predictions across many diverse trees","Always using deeper trees","Eliminating all noise"],correct:1,explanation:"RF averages many trees (each on different bootstrap samples + random features), reducing variance."},
{topic:"Prediction",type:"CALC",calc:true,q:"Actual:[50,60,55,70]. Predicted:[52,58,57,65]. Calculate MAPE.",answer:"APE: |2/50|=0.04, |2/60|=0.033, |2/55|=0.036, |5/70|=0.071. MAPE=(0.04+0.033+0.036+0.071)/4=0.045=4.5%.",explanation:"MAPE = mean of |error/actual| × 100."},
// CLUSTERING EXTRA
{topic:"Clustering",type:"SC",calc:false,q:"Manhattan distance between (2,5) and (6,1) is:",opts:["√32","8","5","4"],correct:1,explanation:"Manhattan: |2-6|+|5-1|=4+4=8."},
{topic:"Clustering",type:"TF",calc:false,q:"K-means is sensitive to the initial placement of centroids.",correct:true,explanation:"Different initializations can lead to different final clusters. Run multiple times recommended."},
{topic:"Clustering",type:"SC",calc:false,q:"A dendrogram in hierarchical clustering shows:",opts:["Feature importance rankings","The sequence of cluster merges and distances at which they occur","The optimal number of features","Training vs. validation error"],correct:1,explanation:"Dendrograms visualize the merge history and cut height determines the number of clusters."},
{topic:"Clustering",type:"MC",calc:false,q:"Which are TRUE about K-means?",opts:["It assumes roughly spherical clusters","It can handle categorical variables directly","Results depend on initialization","It requires pre-specifying K"],correct:[0,2,3],explanation:"K-means uses Euclidean distance — cannot handle categorical variables directly."},
{topic:"Clustering",type:"SC",calc:false,q:"Correlation-based distance dij = 1 - rij means:",opts:["Perfectly correlated records have distance 1","Perfectly correlated records have distance 0","Uncorrelated records have distance 0","Negatively correlated records have distance 0"],correct:1,explanation:"If rij=1 (perfect correlation), then dij=1-1=0 (zero distance = most similar)."},
{topic:"Clustering",type:"TF",calc:false,q:"Complete linkage produces more compact clusters than single linkage.",correct:true,explanation:"Complete uses max distance → avoids chaining → compact clusters."},
{topic:"Clustering",type:"SC",calc:false,q:"Cluster stability is validated by:",opts:["Running K-means once","Clustering subset A, assigning subset B to A's centroids, checking consistency","Increasing K until dispersion is zero","Using only one variable"],correct:1,explanation:"Split data, cluster one part, test consistency by assigning the other part."},
{topic:"Clustering",type:"CALC",calc:true,q:"Manhattan distance between A=(1,3,5) and B=(4,1,2)?",answer:"d = |1-4|+|3-1|+|5-2| = 3+2+3 = 8.",explanation:"Manhattan: sum of absolute differences per dimension."},
{topic:"Clustering",type:"CALC",calc:true,q:"CASE: 3 customers standardized: A=(0,2), B=(3,6), C=(1,1). K-means with K=2, initial centroids=A and B. Assign C to a cluster.",answer:"d(C,A)=√((1-0)²+(1-2)²)=√(1+1)=√2≈1.41. d(C,B)=√((1-3)²+(1-6)²)=√(4+25)=√29≈5.39. C is assigned to Cluster A (closer).",explanation:"Assign to nearest centroid by Euclidean distance."},
// RL EXTRA
{topic:"RL",type:"SC",calc:false,q:"In Decaying ε-Greedy, ε is:",opts:["Constant throughout","Increased over time","Decreased over time to reduce exploration","Set to zero from the start"],correct:2,explanation:"Decaying: reduce ε over time → less exploration, more exploitation as knowledge grows."},
{topic:"RL",type:"TF",calc:false,q:"In an MDP, the discount factor γ determines how much future rewards are valued relative to immediate rewards.",correct:true,explanation:"γ close to 1 = long-term focus. γ close to 0 = short-term (myopic) focus."},
{topic:"RL",type:"SC",calc:false,q:"Which RL problem type is best for personalizing website content based on user features?",opts:["Standard MAB","Contextual Bandit","Full MDP","Supervised Classification"],correct:1,explanation:"Contextual Bandits use context features (user profile, device) to select personalized actions."},
{topic:"RL",type:"MC",calc:false,q:"Which are TRUE about Reinforcement Learning?",opts:["RL starts with no data and learns through interaction","RL requires labeled training examples","The agent receives rewards or penalties as feedback","RL is suitable for adaptive, sequential decision-making"],correct:[0,2,3],explanation:"RL does NOT use labeled examples — it learns from reward signals."},
{topic:"RL",type:"SC",calc:false,q:"Reward hacking in RL means:",opts:["The agent cannot find any rewards","The agent optimizes the reward metric without achieving the true objective","The reward function is too simple","Exploration is too high"],correct:1,explanation:"The agent finds shortcuts that maximize the metric but not the intended behavior."},
{topic:"RL",type:"TF",calc:false,q:"Standard MAB assumes the environment is homogeneous — no contextual differences between players.",correct:true,explanation:"Standard MAB: all players treated the same. Contextual bandits add heterogeneity."},
{topic:"RL",type:"CONCEPT",calc:false,q:"A retailer uses an MAB to test 3 homepage banners. After 1000 visitors, Banner A has avg reward 0.08 (shown 600 times), B has 0.12 (shown 300 times), C has 0.15 (shown 100 times). Which banner should UCB favor next and why?",answer:"UCB favors Banner C — it has the highest average reward AND the highest uncertainty term (√(ln1000/100) is largest due to fewest trials). Both exploitation (highest avg) and exploration (least tested) point to C."},
// NEURALNET EXTRA
{topic:"NeuralNet",type:"SC",calc:false,q:"The learning rate (l) in gradient descent controls:",opts:["The number of hidden layers","The step size of weight updates","The activation function type","The number of epochs"],correct:1,explanation:"l determines how much weights change per update. Too large = overshoot, too small = slow convergence."},
{topic:"NeuralNet",type:"TF",calc:false,q:"Sigmoid activation outputs values between 0 and 1, making it suitable for binary classification output.",correct:true,explanation:"Sigmoid: 1/(1+e^-z) maps any real number to (0,1) — perfect for probability output."},
{topic:"NeuralNet",type:"SC",calc:false,q:"A neural network with no hidden layers is equivalent to:",opts:["A random forest","A logistic/linear regression","A clustering algorithm","A decision tree"],correct:1,explanation:"Without hidden layers, a NN is just a weighted linear combination → linear/logistic regression."},
{topic:"NeuralNet",type:"MC",calc:false,q:"Which statements about backpropagation are TRUE?",opts:["It uses gradient descent to minimize loss","It updates weights from output layer backward","It requires a differentiable activation function","It only works with ReLU activation"],correct:[0,1,2],explanation:"Backprop works with any differentiable activation (Sigmoid, Tanh, ReLU, etc.), not just ReLU."},
{topic:"NeuralNet",type:"SC",calc:false,q:"For a regression task (predicting a continuous value), the output activation should be:",opts:["Sigmoid","Softmax","ReLU","Identity (linear)"],correct:3,explanation:"Identity g(z)=z outputs any real number — appropriate for continuous prediction."},
{topic:"NeuralNet",type:"TF",calc:false,q:"Mini-batch SGD is noisier than full-batch but can escape local minima.",correct:true,explanation:"Noise from mini-batches helps avoid getting stuck in local minima."},
{topic:"NeuralNet",type:"CALC",calc:true,q:"Neuron with 3 inputs: a1=1.0, a2=0.5, a3=0.0. Weights: w1=0.3, w2=-0.2, w3=0.5. Bias θ=0.1. ReLU activation. Calculate output.",answer:"z = 0.3×1.0 + (-0.2)×0.5 + 0.5×0.0 + 0.1 = 0.3 - 0.1 + 0 + 0.1 = 0.3. ReLU(0.3) = max(0, 0.3) = 0.3.",explanation:"Weighted sum + bias, then ReLU."},
// DEEP LEARNING EXTRA
{topic:"DeepLearning",type:"SC",calc:false,q:"In a CNN, what does the convolutional filter detect?",opts:["Global patterns across the entire image","Local features like edges and textures","The optimal learning rate","Class probabilities"],correct:1,explanation:"Filters slide across input detecting local features (edges, corners, textures)."},
{topic:"DeepLearning",type:"TF",calc:false,q:"Max pooling selects the maximum value in each pooling region, keeping the strongest feature activations.",correct:true,explanation:"Max pooling retains the strongest signal in each region while reducing dimensions."},
{topic:"DeepLearning",type:"SC",calc:false,q:"GANs consist of:",opts:["Encoder and decoder","Generator and discriminator","Convolutional and pooling layers","Input and output layers only"],correct:1,explanation:"GAN: Generator creates fake data, Discriminator distinguishes real from fake → adversarial training."},
{topic:"DeepLearning",type:"MC",calc:false,q:"Which are DL limitations?",opts:["Requires large datasets","Black box — hard to interpret","High computational cost","Always outperforms traditional ML"],correct:[0,1,2],explanation:"DL does NOT always outperform — for small/structured data, simpler models can be better."},
{topic:"DeepLearning",type:"SC",calc:false,q:"RNNs are specifically designed for:",opts:["Image classification","Sequential/temporal data","Clustering","Dimensionality reduction"],correct:1,explanation:"RNNs process sequential data by maintaining hidden state across time steps."},
{topic:"DeepLearning",type:"TF",calc:false,q:"Transfer learning allows using a model pre-trained on one task as a starting point for another.",correct:true,explanation:"Common in DL: use ImageNet-trained CNN features for new image tasks."},
{topic:"DeepLearning",type:"SC",calc:false,q:"The CNN feature hierarchy goes from:",opts:["Objects → shapes → pixels","Pixels → edges/shapes → objects","Objects → pixels → edges","Random features at every level"],correct:1,explanation:"Low layers: pixels/edges. Middle: shapes/textures. High: objects/concepts."},
// GENAI EXTRA
{topic:"GenAI",type:"SC",calc:false,q:"Chain-of-Thought (CoT) prompting means:",opts:["Giving the model a chain of unrelated examples","Asking the model to reason step by step before answering","Chaining multiple models together","Using only one-word prompts"],correct:1,explanation:"CoT: instruct the model to show reasoning steps, improving accuracy on complex tasks."},
{topic:"GenAI",type:"TF",calc:false,q:"Few-shot prompting provides multiple examples in the prompt to guide the model's output format.",correct:true,explanation:"Few-shot: include several input-output examples so the model learns the expected pattern."},
{topic:"GenAI",type:"SC",calc:false,q:"According to the slides, an LLM should NOT be used as:",opts:["A work assistant","A search engine starting point","A factual database","An agent with guardrails"],correct:2,explanation:"Don't use as database — LLMs predict tokens, they don't retrieve verified facts."},
{topic:"GenAI",type:"MC",calc:false,q:"Which are LLM limitations?",opts:["Hallucinations","Stochastic outputs (same prompt → different results)","Static knowledge","Perfect factual accuracy"],correct:[0,1,2],explanation:"LLMs do NOT have perfect factual accuracy — that's a key limitation."},
{topic:"GenAI",type:"SC",calc:false,q:"A Diffusion Model generates content by:",opts:["Adversarial training between generator and discriminator","Progressively denoising from pure noise to structured output","Encoding and decoding latent space","Predicting the next token in a sequence"],correct:1,explanation:"Diffusion: start with noise, iteratively remove noise to produce the final output."},
{topic:"GenAI",type:"TF",calc:false,q:"RAG provides higher transparency than fine-tuning because it can cite retrieved sources.",correct:true,explanation:"RAG retrieves documents and can show citations — making the reasoning traceable."},
{topic:"GenAI",type:"SC",calc:false,q:"The 'Role' component in prompt engineering defines:",opts:["The output format","The expertise and tone the model should adopt","The number of examples","The maximum response length"],correct:1,explanation:"Role: sets the persona, expertise level, and communication style."},
{topic:"GenAI",type:"CONCEPT",calc:false,q:"You need an LLM to analyze quarterly financial reports that change every 3 months. Should you use fine-tuning or RAG? Justify.",answer:"RAG is better because financial reports change frequently. RAG dynamically retrieves the latest documents at inference time without retraining. Fine-tuning would require retraining every quarter, which is costly and slow. RAG also provides citations to specific report sections, increasing transparency."},
// RDS EXTRA
{topic:"RDS",type:"SC",calc:false,q:"The Accountability principle means:",opts:["Making all data public","Assigning clear responsibility for AI system outcomes","Maximizing model accuracy","Using only open-source tools"],correct:1,explanation:"Accountability: someone must be responsible for the system's decisions and their consequences."},
{topic:"RDS",type:"TF",calc:false,q:"In the COMPAS case, it is mathematically possible to equalize all fairness metrics when base rates differ across groups.",correct:false,explanation:"When base rates differ, equalizing one metric (e.g., FPR) necessarily un-equalizes another (e.g., FNR). It's mathematically impossible."},
{topic:"RDS",type:"SC",calc:false,q:"Datasheets in the RDS framework are produced during which phases?",opts:["Only Justification","Assembly and Data Preparation","Only Modeling","Only Auditing"],correct:1,explanation:"Datasheets document data collection (Assembly) and processing decisions (Data Preparation)."},
{topic:"RDS",type:"MC",calc:false,q:"Which are bias mitigation strategies?",opts:["Re-sampling the training data","Re-weighting observations","Adjusting decision thresholds per group","Ignoring the problem and hoping accuracy is high enough"],correct:[0,1,2],explanation:"Ignoring bias is not a strategy. Fix input (resample/reweight), fix model, fix output (thresholds)."},
{topic:"RDS",type:"SC",calc:false,q:"In the Optum case, 'label bias' occurred because:",opts:["Race was included as a predictor","Healthcare cost was used as a proxy for health needs, but spending patterns differ by race","The model had low accuracy","Too few variables were used"],correct:1,explanation:"African-Americans historically spend less due to access barriers → cost ≠ actual health needs."},
{topic:"RDS",type:"TF",calc:false,q:"An Impact Statement determines whether a project should be built at all.",correct:true,explanation:"Justification phase: if the Impact Statement shows harms outweigh benefits, the project stops."},
{topic:"RDS",type:"SC",calc:false,q:"Privacy in RDS includes protection against:",opts:["Model complexity","The Mosaic Effect — re-identification through data aggregation","Overfitting","Feature importance bias"],correct:1,explanation:"Mosaic Effect: combining anonymized datasets can re-identify individuals."},
{topic:"RDS",type:"CONCEPT",calc:false,q:"A bank uses AI for loan decisions. The model never sees 'race' as input but uses zip code and education level. Could this still be biased? Explain using the concept from the slides.",answer:"Yes — this is Proxy Discrimination. Zip code and education level are correlated with race due to historical socioeconomic patterns. Even without 'race' as a direct input, these proxy variables can reconstruct racial bias. Simply removing sensitive attributes does not guarantee fairness."},

let mode='flash',activeTopic='All',filteredCards=[...cards],currentIdx=0;
let progress=JSON.parse(localStorage.getItem('bai-progress')||'{}');
let examSession=null;
const topicMap={"All":"All","Intro":"Intro","Data":"Data","TimeSeries":"Time Series","Classification":"Classification","Prediction":"Prediction","Clustering":"Clustering","RL":"RL","NeuralNet":"Neural Net","DeepLearning":"Deep Learning","GenAI":"Gen AI","RDS":"RDS"};
function getTopics(p){const t=new Set();p.forEach(c=>t.add(c.topic));return[...t];}
document.querySelectorAll('.mode-tab').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.mode-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');mode=btn.dataset.mode;examSession=null;activeTopic='All';renderTopics();renderView();});});
function renderTopics(){const pool=mode==='flash'?cards:examQuestions;const topics=getTopics(pool);const c=document.getElementById('topic-buttons');c.innerHTML='';const a=document.createElement('button');a.className='topic-btn'+(activeTopic==='All'?' active':'');a.textContent='All';a.onclick=()=>{activeTopic='All';renderTopics();filterAndRender();};c.appendChild(a);topics.forEach(t=>{const b=document.createElement('button');b.className='topic-btn'+(activeTopic===t?' active':'');b.textContent=topicMap[t]||t;b.onclick=()=>{activeTopic=t;renderTopics();filterAndRender();};c.appendChild(b);});}
function filterAndRender(){if(mode==='flash'){filteredCards=activeTopic==='All'?[...cards]:cards.filter(c=>c.topic===activeTopic);currentIdx=0;renderView();}else{examSession=null;renderView();}}
function renderView(){const fa=document.getElementById('flash-area'),ea=document.getElementById('exam-area'),es=document.getElementById('exam-settings'),sb=document.getElementById('stats-bar');if(mode==='flash'){fa.classList.remove('hidden');ea.classList.add('hidden');ea.style.display='none';es.classList.add('hidden');sb.classList.remove('hidden');renderCard();}else{fa.classList.add('hidden');ea.classList.remove('hidden');if(examSession&&examSession.submitted){es.classList.add('hidden');sb.classList.remove('hidden');ea.style.display='block';}else if(examSession){es.classList.add('hidden');sb.classList.remove('hidden');ea.style.display='block';renderExam();}else{es.classList.remove('hidden');sb.classList.add('hidden');const si=document.getElementById('exam-structure-info');if(si)si.textContent=mode==='examCalc'?'5× SC · 3× MC · 5× TF · 2× Concept · 3× Calc = 18 Q':'5× SC · 3× MC · 5× TF · 2× Concept = 15 Q';ea.innerHTML='<p style="text-align:center;color:#999;padding:40px">Click Start Exam to begin.</p>';ea.style.display='block';}}}
function renderCard(){if(!filteredCards.length){document.getElementById('card-area').innerHTML='<p style="text-align:center;padding:60px;color:#999">No cards for this topic.</p>';return;}const c=filteredCards[currentIdx];document.getElementById('card-area').innerHTML='<div class="card" id="the-card" onclick="flipCard()"><div class="card-face card-front"><span class="card-tag">'+(topicMap[c.topic]||c.topic)+'</span><div class="card-question">'+c.q+'</div><div class="card-hint">Click to reveal answer</div></div><div class="card-face card-back"><span class="card-tag">'+(topicMap[c.topic]||c.topic)+'</span><div class="card-answer">'+c.a+'</div></div></div>';document.getElementById('current-num').textContent=currentIdx+1;document.getElementById('total-num').textContent=filteredCards.length;document.getElementById('progress-fill').style.width=((currentIdx+1)/filteredCards.length*100)+'%';document.getElementById('btn-prev').disabled=currentIdx===0;document.getElementById('btn-next').disabled=currentIdx>=filteredCards.length-1;document.getElementById('diff-buttons').classList.remove('visible');}
function flipCard(){const c=document.getElementById('the-card');if(c){c.classList.toggle('flipped');if(c.classList.contains('flipped'))document.getElementById('diff-buttons').classList.add('visible');}}
document.getElementById('btn-flip').onclick=flipCard;
document.getElementById('btn-prev').onclick=()=>{if(currentIdx>0){currentIdx--;renderCard();}};
document.getElementById('btn-next').onclick=()=>{if(currentIdx<filteredCards.length-1){currentIdx++;renderCard();}};
document.querySelectorAll('.diff-btn').forEach(b=>{b.addEventListener('click',()=>{const k=filteredCards[currentIdx].q;progress[k]=b.dataset.diff;localStorage.setItem('bai-progress',JSON.stringify(progress));if(currentIdx<filteredCards.length-1){currentIdx++;renderCard();}});});
document.getElementById('reset').onclick=()=>{progress={};localStorage.removeItem('bai-progress');alert('Progress reset.');};
document.getElementById('btn-start-exam').onclick=()=>{const wc=mode==='examCalc';let pool=examQuestions.filter(q=>wc?true:!q.calc);if(activeTopic!=='All')pool=pool.filter(q=>q.topic===activeTopic);const pick=(type,n)=>{let p=pool.filter(q=>q.type===type).sort(()=>Math.random()-0.5);return p.slice(0,n);};let qs;if(wc){qs=[...pick('SC',5),...pick('MC',3),...pick('TF',5),...pick('CONCEPT',2),...pick('CALC',3)];}else{qs=[...pick('SC',5),...pick('MC',3),...pick('TF',5),...pick('CONCEPT',2)];}if(!qs.length){alert('No questions available.');return;}examSession={questions:qs,answers:new Array(qs.length).fill(null),submitted:false};document.getElementById('stats-bar').innerHTML='Questions: <span>'+qs.length+'</span>';renderView();};
function renderExam(){if(!examSession)return;const area=document.getElementById('exam-area');const tl={SC:'Single Choice',MC:'Multiple Choice',TF:'True / False',CONCEPT:'Concept Check',CALC:'Calculation'};const partNames={SC:'Part I: Single Choice Questions (4 pts each)',MC:'Part II: Multiple Choice Questions (5 pts each)',TF:'Part III: True / False Questions (3 pts each)',CONCEPT:'Part IV: Concept Check (5 pts each)',CALC:'Part V: Case Study / Calculation'};const partInstr={SC:'Select the one best answer.',MC:'Select all correct answers. Partial credit for incomplete answers; one incorrect option = 0 points.',TF:'Indicate whether the statement is True or False.',CONCEPT:'Answer concisely.',CALC:'Show your working. Keep two decimal places where necessary.'};let h='';let lastType='';examSession.questions.forEach((q,i)=>{if(q.type!==lastType){lastType=q.type;h+='<div style="background:#4a7c2a;color:#fff;padding:10px 16px;border-radius:8px;margin:18px 0 4px;font-weight:700;font-size:14px">'+(partNames[q.type]||q.type)+'</div>';h+='<div style="font-size:12px;color:#666;padding:4px 16px 10px;font-style:italic">'+(partInstr[q.type]||'')+'</div>';}h+='<div class="q-card"><div class="q-num">Q'+(i+1)+' · '+(topicMap[q.topic]||q.topic)+'</div><div class="q-type">'+tl[q.type]+'</div><div class="q-text">'+q.q+'</div>';if(q.type==='SC'){h+='<div class="q-options">';q.opts.forEach((o,j)=>{h+='<label><input type="radio" name="q'+i+'" value="'+j+'" onchange="setAns('+i+','+j+')"> '+o+'</label>';});h+='</div>';}else if(q.type==='MC'){h+='<div class="q-options">';q.opts.forEach((o,j)=>{h+='<label><input type="checkbox" name="q'+i+'" value="'+j+'" onchange="setAnsMC('+i+')"> '+o+'</label>';});h+='</div>';}else if(q.type==='TF'){h+='<div class="q-tf"><label><input type="radio" name="q'+i+'" value="true" onchange="setAns('+i+',true)"> True</label><label><input type="radio" name="q'+i+'" value="false" onchange="setAns('+i+',false)"> False</label></div>';}else if(q.type==='CONCEPT'){h+='<div class="q-concept"><textarea placeholder="Type your answer..." oninput="setAnsTxt('+i+',this.value)"></textarea></div>';}else if(q.type==='CALC'){h+='<div class="q-calc"><input type="text" placeholder="Show calculation and answer..." oninput="setAnsTxt('+i+',this.value)"></div>';}h+='</div>';});h+='<button class="btn-submit" onclick="submitExam()">Submit Exam</button>';area.innerHTML=h;area.style.display='block';}
window.setAns=(i,v)=>{examSession.answers[i]=v;};
window.setAnsMC=(i)=>{const b=document.querySelectorAll('input[name="q'+i+'"]:checked');examSession.answers[i]=[...b].map(x=>parseInt(x.value));};
window.setAnsTxt=(i,v)=>{examSession.answers[i]=v;};
window.submitExam=()=>{examSession.submitted=true;let correct=0,total=0,manual=0;const area=document.getElementById('exam-area');const partNames={SC:'Part I: Single Choice',MC:'Part II: Multiple Choice',TF:'Part III: True / False',CONCEPT:'Part IV: Concept Check',CALC:'Part V: Case Study / Calculation'};let h='';let lt='';examSession.questions.forEach((q,i)=>{if(q.type!==lt){lt=q.type;h+='<div style="background:#4a7c2a;color:#fff;padding:10px 16px;border-radius:8px;margin:18px 0 10px;font-weight:700;font-size:14px">'+(partNames[q.type]||q.type)+'</div>';}const a=examSession.answers[i];let ok=false,isConcept=false;if(q.type==='SC'){ok=a===q.correct;total++;}else if(q.type==='TF'){ok=a===q.correct;total++;}else if(q.type==='MC'){if(Array.isArray(a)&&Array.isArray(q.correct)){const s1=[...a].sort(),s2=[...q.correct].sort();ok=s1.length===s2.length&&s1.every((v,j)=>v===s2[j]);}total++;}else{isConcept=true;manual++;}if(ok)correct++;const cls=isConcept?'manual':(ok?'correct':'incorrect');h+='<div class="q-card result-card '+cls+'"><div class="q-num">'+(ok?'✅':isConcept?'📝':'❌')+' Q'+(i+1)+' · '+(topicMap[q.topic]||q.topic)+'</div><div class="q-text">'+q.q+'</div>';if(q.type==='SC'){h+='<div class="result-explanation">Your answer: <strong>'+(a!==null?q.opts[a]:'(none)')+'</strong><br>Correct: <strong>'+q.opts[q.correct]+'</strong><br>'+q.explanation+'</div>';}else if(q.type==='TF'){h+='<div class="result-explanation">Your answer: <strong>'+(a!==null?(a?'True':'False'):'(none)')+'</strong><br>Correct: <strong>'+(q.correct?'True':'False')+'</strong><br>'+q.explanation+'</div>';}else if(q.type==='MC'){const yl=Array.isArray(a)?a.map(j=>q.opts[j]).join(', '):'(none)';const cl=q.correct.map(j=>q.opts[j]).join(', ');h+='<div class="result-explanation">Your answer: <strong>'+yl+'</strong><br>Correct: <strong>'+cl+'</strong><br>'+q.explanation+'</div>';}else{h+='<div class="result-explanation">Your answer: <em>'+(a||'(empty)')+'</em><br>Model answer: <strong>'+q.answer+'</strong>'+(q.explanation?'<br>'+q.explanation:'')+'</div>';}h+='</div>';});const pct=total>0?Math.round(correct/total*100):0;let sh='<div class="score-box"><div class="score-big">'+correct+'/'+total+'</div><div class="score-label">Auto-scored ('+pct+'%)'+(manual>0?' · '+manual+' concept/calc for self-review':'')+'</div></div>';sh+=h;sh+='<button class="btn-export" onclick="exportResults()">📋 Copy results for Claude feedback</button>';sh+='<button class="btn-retry" onclick="retryExam()">🔄 New Exam</button>';area.innerHTML=sh;document.getElementById('stats-bar').innerHTML='Score: <span>'+correct+'/'+total+' ('+pct+'%)</span>';};
window.exportResults=()=>{let t='=== Business AI Exam Results ===\nScore: '+(document.querySelector('.score-big')?.textContent||'')+'\n\n';examSession.questions.forEach((q,i)=>{const a=examSession.answers[i];t+='Q'+(i+1)+' ['+q.type+'] ('+q.topic+'): '+q.q+'\n';if(q.type==='SC')t+='My answer: '+(a!==null?q.opts[a]:'(none)')+' | Correct: '+q.opts[q.correct]+'\n';else if(q.type==='TF')t+='My answer: '+(a!==null?a:'(none)')+' | Correct: '+q.correct+'\n';else if(q.type==='MC')t+='My answer: '+(Array.isArray(a)?a.map(j=>q.opts[j]).join(', '):'(none)')+' | Correct: '+q.correct.map(j=>q.opts[j]).join(', ')+'\n';else t+='My answer: '+(a||'(empty)')+'\nModel answer: '+q.answer+'\n';t+='\n';});navigator.clipboard.writeText(t).then(()=>alert('Results copied! Paste into Claude for detailed feedback.')).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('Copied!');});};
window.retryExam=()=>{examSession=null;renderView();};
renderTopics();renderView();
</script></body></html>
