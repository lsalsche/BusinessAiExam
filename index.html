<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business AI – Study App</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #f3f7eb 0%, #e8f0d8 100%);
    min-height: 100vh;
    color: #2a2a2a;
    padding: 20px;
  }
  .container { max-width: 820px; margin: 0 auto; }
  header { text-align: center; padding: 18px 0 24px; }
  h1 { color: #4a7c2a; font-size: 28px; margin-bottom: 4px; }
  .subtitle { color: #777; font-size: 13px; font-style: italic; }

  /* Main menu */
  .menu {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    margin-top: 12px;
  }
  @media (min-width: 640px) {
    .menu { grid-template-columns: repeat(3, 1fr); }
  }
  .menu-card {
    background: white;
    border-radius: 14px;
    padding: 24px 20px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.06);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    text-align: center;
    border: 1.5px solid transparent;
  }
  .menu-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    border-color: #c5d4a8;
  }
  .menu-icon { font-size: 38px; margin-bottom: 10px; }
  .menu-title { font-size: 17px; font-weight: 700; color: #4a7c2a; margin-bottom: 6px; }
  .menu-desc { font-size: 12px; color: #666; line-height: 1.4; }

  /* Setup screen */
  .setup-card {
    background: white;
    border-radius: 14px;
    padding: 22px 22px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.06);
    margin-bottom: 14px;
  }
  .setup-title { font-size: 16px; font-weight: 700; color: #4a7c2a; margin-bottom: 10px; }
  .setup-section { margin-bottom: 16px; }
  .setup-section-label {
    font-size: 13px; color: #555; margin-bottom: 8px; font-weight: 600;
  }
  .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px;
  }
  .topic-chip {
    padding: 8px 12px;
    border: 1.5px solid #d0d6c8;
    background: #fafbf7;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    color: #4a7c2a;
    transition: all 0.15s;
    user-select: none;
  }
  .topic-chip:hover { border-color: #7ba84c; }
  .topic-chip.selected {
    background: #4a7c2a;
    color: white;
    border-color: #4a7c2a;
  }
  .length-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
  .length-btn {
    padding: 8px 16px;
    border: 1.5px solid #d0d6c8;
    background: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: #4a7c2a;
  }
  .length-btn.active {
    background: #4a7c2a;
    color: white;
    border-color: #4a7c2a;
  }
  .start-btn {
    width: 100%;
    padding: 14px;
    background: #4a7c2a;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .start-btn:hover { background: #3d6822; }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .back-btn {
    background: white;
    border: 1.5px solid #d0d6c8;
    color: #4a7c2a;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    margin-bottom: 14px;
    font-weight: 600;
  }
  .back-btn:hover { background: #f3f7eb; }

  /* Flashcards (reused) */
  .controls-bar {
    background: white;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: space-between;
  }
  .stats { font-size: 13px; color: #555; }
  .stats span { font-weight: 700; color: #4a7c2a; }
  .card-area { position: relative; perspective: 1200px; margin-bottom: 16px; min-height: 280px; }
  .flashcard {
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: transform 0.5s;
    transform-style: preserve-3d;
    position: relative;
    min-height: 280px;
  }
  .flashcard.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0; backface-visibility: hidden;
    padding: 32px 28px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .card-back { transform: rotateY(180deg); }
  .card-tag {
    display: inline-block;
    background: #e8f0d8;
    color: #4a7c2a;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 4px;
    margin-bottom: 14px;
    align-self: flex-start;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .card-question {
    font-size: 20px; font-weight: 600; color: #2a2a2a; line-height: 1.4; margin-bottom: 14px;
  }
  .card-hint {
    font-size: 11px; color: #999; font-style: italic;
    position: absolute; bottom: 14px; left: 28px; right: 28px; text-align: center;
  }
  .card-answer { font-size: 14px; line-height: 1.55; color: #333; }
  .card-answer strong { color: #4a7c2a; }
  .nav-buttons { display: flex; gap: 10px; margin-bottom: 14px; }
  .nav-btn {
    flex: 1; padding: 11px; border-radius: 8px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-prev, .btn-next {
    background: white; color: #4a7c2a; border: 1px solid #c5d4a8;
  }
  .btn-flip { background: #4a7c2a; color: white; }
  .progress-bar {
    background: white; border-radius: 999px; height: 6px;
    overflow: hidden; margin-bottom: 14px;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.06);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #7ba84c, #4a7c2a);
    transition: width 0.3s;
  }

  /* Exam */
  .exam-question {
    background: white;
    border-radius: 12px;
    padding: 20px 22px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .q-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; font-size: 12px;
  }
  .q-num { font-weight: 700; color: #4a7c2a; font-size: 14px; }
  .q-type {
    background: #e8f0d8; color: #4a7c2a; padding: 2px 8px;
    border-radius: 4px; font-weight: 600; font-size: 11px;
  }
  .q-topic { color: #999; font-style: italic; font-size: 11px; }
  .q-text { font-size: 14px; line-height: 1.5; margin-bottom: 14px; }
  .q-options { list-style: none; }
  .q-options li { margin-bottom: 6px; }
  .q-options label {
    display: flex; padding: 9px 12px;
    border: 1.5px solid #e3e3e3; border-radius: 8px;
    cursor: pointer; transition: all 0.1s;
    font-size: 13px; line-height: 1.4;
  }
  .q-options label:hover { background: #fafbf7; border-color: #c5d4a8; }
  .q-options input { margin-right: 10px; margin-top: 2px; accent-color: #4a7c2a; }
  .q-options label.selected { background: #f3f7eb; border-color: #7ba84c; }
  .q-options label.correct-answer { background: #d1e7dd; border-color: #4a7c2a; }
  .q-options label.wrong-answer { background: #f8d7da; border-color: #842029; }
  .q-textarea {
    width: 100%; min-height: 80px; padding: 10px;
    border: 1.5px solid #e3e3e3; border-radius: 8px;
    font-family: inherit; font-size: 13px; resize: vertical;
  }
  .q-textarea:focus { outline: none; border-color: #7ba84c; }
  .q-input {
    padding: 9px 12px;
    border: 1.5px solid #e3e3e3; border-radius: 8px;
    font-family: inherit; font-size: 14px;
    width: 200px;
  }
  .q-input:focus { outline: none; border-color: #7ba84c; }

  .submit-btn {
    width: 100%; padding: 14px;
    background: #4a7c2a; color: white;
    border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    margin-top: 8px;
  }
  .submit-btn:hover { background: #3d6822; }

  /* Result page */
  .result-banner {
    background: white;
    border-radius: 14px;
    padding: 26px;
    text-align: center;
    margin-bottom: 16px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.06);
  }
  .result-score { font-size: 44px; font-weight: 800; color: #4a7c2a; line-height: 1; }
  .result-grade { font-size: 16px; color: #555; margin-top: 6px; }
  .result-subscore { font-size: 13px; color: #999; margin-top: 12px; }
  .result-feedback {
    margin-top: 16px; padding: 12px;
    background: #f3f7eb; border-radius: 8px;
    font-size: 13px; color: #4a7c2a;
    line-height: 1.5;
  }
  .review-question {
    background: white; border-radius: 12px;
    padding: 18px 22px; margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .review-header {
    display: flex; gap: 10px; align-items: center; margin-bottom: 10px;
  }
  .check-icon { font-size: 18px; }
  .review-explain {
    margin-top: 10px; padding: 10px 12px;
    background: #fff9e6; border-left: 3px solid #c5b56a;
    border-radius: 6px; font-size: 12px; color: #555;
    line-height: 1.5; font-style: italic;
  }
  .review-explain strong { color: #8a6d1a; font-style: normal; }
  .your-answer { font-size: 12px; color: #666; margin-top: 6px; }
  .correct-marker { color: #0f5132; font-weight: 600; }
  .wrong-marker { color: #842029; font-weight: 600; }

  .action-buttons {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin-top: 16px;
  }
  @media (min-width: 640px) {
    .action-buttons { grid-template-columns: 1fr 1fr 1fr; }
  }
  .action-btn {
    padding: 12px;
    background: white;
    border: 1.5px solid #d0d6c8;
    color: #4a7c2a;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
  }
  .action-btn:hover { background: #f3f7eb; }
  .action-btn.primary {
    background: #4a7c2a; color: white; border-color: #4a7c2a;
  }
  .action-btn.primary:hover { background: #3d6822; }

  /* Export modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center; justify-content: center;
    z-index: 1000; padding: 20px;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: white; border-radius: 14px;
    padding: 24px; max-width: 600px; width: 100%;
    max-height: 80vh; overflow-y: auto;
  }
  .modal h3 { color: #4a7c2a; margin-bottom: 10px; }
  .modal p { font-size: 13px; color: #555; margin-bottom: 12px; line-height: 1.5; }
  .modal textarea {
    width: 100%; min-height: 280px; padding: 10px;
    font-family: 'Courier New', monospace; font-size: 11px;
    border: 1px solid #e3e3e3; border-radius: 6px;
    line-height: 1.5;
  }
  .modal-buttons { display: flex; gap: 10px; margin-top: 14px; }
  .modal-buttons button {
    flex: 1; padding: 10px;
    border: none; border-radius: 8px;
    cursor: pointer; font-weight: 600; font-size: 13px;
  }
  .modal-buttons .btn-copy { background: #4a7c2a; color: white; }
  .modal-buttons .btn-close { background: #e3e3e3; color: #333; }

  .calc-hint {
    background: #fff9e6; border-left: 3px solid #c5b56a;
    padding: 10px 12px; border-radius: 6px;
    font-size: 12px; color: #8a6d1a;
    margin-bottom: 12px; font-style: italic;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>📘 Business AI – Study App</h1>
    <p class="subtitle">Flashcards · Exam mode · Self-paced learning</p>
  </header>

  <div id="app"></div>
</div>

<!-- Export modal -->
<div class="modal-overlay" id="export-modal">
  <div class="modal">
    <h3>📤 Send to Claude for detailed feedback</h3>
    <p>Copy the text below and paste it into your Claude chat. Claude will go through your answers in detail and give you personalized feedback.</p>
    <textarea id="export-text" readonly></textarea>
    <div class="modal-buttons">
      <button class="btn-copy" onclick="copyExport()">📋 Copy to clipboard</button>
      <button class="btn-close" onclick="closeExport()">Close</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// FLASHCARDS DATA
// ═══════════════════════════════════════════════════════════════
const FLASHCARDS = [
  // Introduction
  { topic: "Introduction", q: "What is the ISO definition of Machine Learning?", a: "A process of <strong>optimizing model parameters</strong> through <strong>computational techniques</strong>, such that the model's behavior reflects the data or experience." },
  { topic: "Introduction", q: "What are the 3 Learning Paradigms?", a: "<strong>Supervised Learning</strong> (with labels), <strong>Unsupervised Learning</strong> (without labels), <strong>Reinforcement Learning</strong> (through reward / penalty)." },
  { topic: "Introduction", q: "What are the 5 ethical principles in ML?", a: "<strong>Non-maleficence</strong>, <strong>Fairness</strong>, <strong>Transparency</strong>, <strong>Accountability</strong>, <strong>Privacy</strong>." },
  { topic: "Introduction", q: "What are 3 typical causes of overfitting?", a: "<strong>(1)</strong> Model is too complex, <strong>(2)</strong> too many features, <strong>(3)</strong> insufficient training data." },
  { topic: "Introduction", q: "How can you detect overfitting?", a: "By <strong>splitting data into training, validation and holdout sets</strong>. If training error is low but validation/holdout error is high, the model overfits." },

  // Data Basics
  { topic: "Data Basics", q: "What are the 4 V's of Big Data?", a: "<strong>Volume</strong> (amount), <strong>Variety</strong> (different types), <strong>Velocity</strong> (speed), <strong>Veracity</strong> (truthfulness)." },
  { topic: "Data Basics", q: "Which sampling methods exist?", a: "<strong>RaS</strong> – Random Sampling, <strong>SyS</strong> – Systematic Sampling, <strong>StS</strong> – Stratified Sampling." },
  { topic: "Data Basics", q: "What does PCA (Principal Component Analysis) do?", a: "It transforms correlated original variables into a <strong>smaller number of uncorrelated principal components</strong> that capture most of the variance. Used for dimension reduction." },
  { topic: "Data Basics", q: "Standardization vs. Rescaling – difference?", a: "<strong>Standardization (z-score):</strong> mean 0, standard deviation 1.<br><strong>Rescaling (min-max):</strong> scales to a fixed range, typically [0, 1]." },
  { topic: "Data Basics", q: "How to handle missing values in time series?", a: "<strong>Short gaps:</strong> linear interpolation is acceptable.<br><strong>Long gaps:</strong> keep as NaN — imputation would mean inventing data." },
  { topic: "Data Basics", q: "Why is oversampling rare events important?", a: "If rare events are underrepresented, models will <strong>underestimate their practical importance</strong>. Oversampling ensures models pay attention to these critical cases." },
  { topic: "Data Basics", q: "Structured vs. unstructured data?", a: "<strong>Structured:</strong> tabular, fixed schema (rows = observations, columns = variables).<br><strong>Unstructured:</strong> text, images, audio, video — no fixed schema, harder to process directly." },

  // Time Series
  { topic: "Time Series", q: "What are the 4 components of a time series?", a: "<strong>Level</strong> (baseline), <strong>Trend</strong> (long-term direction), <strong>Seasonality</strong> (recurring patterns), <strong>Noise</strong> (random variation)." },
  { topic: "Time Series", q: "Model-based vs. Data-driven methods?", a: "<strong>Model-based:</strong> user specifies the model structure (e.g. linear trend, AR(p)).<br><strong>Data-driven:</strong> the method learns patterns directly from the data (e.g. Moving Average, RNN)." },
  { topic: "Time Series", q: "What is autocorrelation?", a: "Measures the <strong>correlation between a series and its own lagged values</strong>. Positive = persistence, negative = alternation, strong at a fixed lag = seasonality." },
  { topic: "Time Series", q: "What is Autoregression AR(p)?", a: "Predicting the current value from the <strong>p previous values of the same variable</strong>. Often applied to residuals to improve forecasting accuracy." },
  { topic: "Time Series", q: "Why must train/test split for time series be chronological?", a: "Random splits would cause <strong>data leakage</strong> — the model would 'learn from the future'. Chronological splitting prevents leakage and gives realistic performance estimates." },
  { topic: "Time Series", q: "What can Holt-Winter Smoothing capture?", a: "It captures <strong>both trend AND seasonality</strong> simultaneously — unlike Single or Holt's exponential smoothing." },
  { topic: "Time Series", q: "Naïve Benchmark – what is it?", a: "The simplest possible forecast: <strong>tomorrow = today</strong> (or season ago for seasonal data). Used as a baseline to evaluate more advanced models against." },

  // Classification
  { topic: "Classification", q: "What does a Confusion Matrix show?", a: "A table comparing <strong>predicted vs. actual classes</strong>: TP, FP, TN, FN. Basis for all classification metrics." },
  { topic: "Classification", q: "Definition: Sensitivity / Recall?", a: "<strong>TPR = TP / (TP + FN)</strong> — proportion of actual positives correctly identified. Answers: 'How many real positives did I find?'" },
  { topic: "Classification", q: "Definition: Specificity?", a: "<strong>TN / (TN + FP)</strong> — proportion of actual negatives correctly identified. Answers: 'How many real negatives did I correctly reject?'" },
  { topic: "Classification", q: "Definition: Precision?", a: "<strong>TP / (TP + FP)</strong> — of all predicted positives, how many are actually positive. Answers: 'How reliable is my Yes?'" },
  { topic: "Classification", q: "What is the F1-Score?", a: "The <strong>harmonic mean of Precision and Recall</strong>. Useful for imbalanced classes because it balances both metrics." },
  { topic: "Classification", q: "What does a ROC curve show?", a: "The <strong>tradeoff between TPR (y-axis) and FPR (x-axis) across all thresholds</strong>. Each point represents one cutoff value." },
  { topic: "Classification", q: "What does AUC mean?", a: "<strong>Area Under the Curve</strong>. 1.0 = perfect model, 0.5 = random. Summarizes model quality across all thresholds in one number." },
  { topic: "Classification", q: "How does K-Nearest Neighbors (K-NN) work?", a: "A new observation is assigned to the <strong>majority class among its K nearest neighbors</strong>. Distance-based, so standardization is required." },
  { topic: "Classification", q: "How does K affect K-NN behavior?", a: "<strong>Small K:</strong> more overfitting (sensitive to noise).<br><strong>Large K:</strong> more underfitting (over-smooths)." },
  { topic: "Classification", q: "What does Logistic Regression actually produce?", a: "It estimates <strong>probabilities between 0 and 1</strong> using the logit function. A <strong>cutoff value</strong> converts those probabilities into class labels." },
  { topic: "Classification", q: "How does a Classification Tree split?", a: "It partitions data through <strong>sequential splits</strong> chosen to <strong>minimize Gini impurity or entropy</strong> at each step, creating homogeneous subsets." },
  { topic: "Classification", q: "What is V-fold Cross-Validation?", a: "Data is split into <strong>V equal folds</strong>. Each fold serves once as the test set, the rest as training. Final score = average → more <strong>stable</strong> performance estimate." },
  { topic: "Classification", q: "What is a Cutoff Value?", a: "The <strong>probability threshold</strong> above which an observation is classified as positive. Lowering the cutoff increases both TPR and FPR." },

  // Numeric Prediction
  { topic: "Numeric Pred.", q: "Explanatory vs. Predictive Modeling?", a: "<strong>Explanatory:</strong> understand HOW and WHY variables affect the outcome (focus on interpretability).<br><strong>Predictive:</strong> generate accurate predictions on new data (black box is okay)." },
  { topic: "Numeric Pred.", q: "MAE vs. RMSE – difference?", a: "<strong>MAE:</strong> average of absolute errors (all errors weighted equally).<br><strong>RMSE:</strong> squared errors → penalizes large errors more heavily. RMSE ≥ MAE always." },
  { topic: "Numeric Pred.", q: "What does ME (Mean Error) measure?", a: "Signed average of errors → measures <strong>bias</strong>, i.e. whether the model systematically over- or underestimates. RMSE / MAE can't detect this." },
  { topic: "Numeric Pred.", q: "Variable Selection methods for Linear Regression?", a: "<strong>Exhaustive Search</strong> (try all combinations), <strong>Forward Selection</strong> (add stepwise), <strong>Backward Elimination</strong> (remove stepwise), <strong>Stepwise</strong> (both combined)." },
  { topic: "Numeric Pred.", q: "Ridge vs. Lasso vs. Elastic Net?", a: "<strong>Ridge (L2):</strong> penalizes large coefficients, keeps all variables.<br><strong>Lasso (L1):</strong> can set coefficients to exactly 0 → automatic variable selection.<br><strong>Elastic Net:</strong> combines both penalties." },
  { topic: "Numeric Pred.", q: "Main purpose of Regularization?", a: "<strong>Reduces overfitting</strong> by penalizing large coefficients. The model becomes simpler and generalizes better to unseen data." },
  { topic: "Numeric Pred.", q: "What is MAPE and when is it used?", a: "<strong>Mean Absolute Percentage Error</strong>. Useful when comparing errors across different scales (e.g. forecasting sales at different stores)." },

  // Ensemble
  { topic: "Ensemble", q: "What is the core idea of Ensemble Methods?", a: "Multiple weak learners combined into one strong model. <strong>Wisdom of crowds</strong> — the combination is more robust than any single model." },
  { topic: "Ensemble", q: "How does Random Forest work?", a: "<strong>Many trees in parallel</strong> on bootstrap samples + random feature selection per split. Final prediction = majority vote / average." },
  { topic: "Ensemble", q: "How do Boosted Trees work?", a: "<strong>Sequential</strong> training: each new tree corrects the errors of the previous ones. Unlike Random Forest (parallel), Boosting is iterative." },
  { topic: "Ensemble", q: "Random Forest vs. Boosted Trees – when which?", a: "<strong>RF:</strong> robust, less tuning, good with many features.<br><strong>Boosting:</strong> often higher accuracy but more sensitive, more tuning needed, more prone to overfitting." },
  { topic: "Ensemble", q: "Bagging vs. Boosting – key difference?", a: "<strong>Bagging:</strong> parallel, independent models (e.g. Random Forest) → reduces variance.<br><strong>Boosting:</strong> sequential, each model fixes previous errors → reduces bias." },
  { topic: "Ensemble", q: "What does Feature Importance tell you?", a: "How much each input variable contributes to the model's predictions. Random Forests give it for free via the average improvement each feature provides across splits." },

  // Clustering
  { topic: "Clustering", q: "Distance measures for numerical variables?", a: "<strong>Euclidean Distance</strong> (straight line), <strong>Manhattan Distance</strong> (sum of absolute differences), <strong>Mahalanobis</strong> (accounts for correlation)." },
  { topic: "Clustering", q: "Distance measures for categorical / binary variables?", a: "<strong>Matching Coefficient</strong> (proportion of matching values) and <strong>Jaccard Coefficient</strong> (ignores joint zeros — for asymmetric binary data)." },
  { topic: "Clustering", q: "K-means vs. Hierarchical – core difference?", a: "<strong>K-means:</strong> K must be set in advance, iterative assignment to closest centroid.<br><strong>Hierarchical:</strong> builds a dendrogram, K chosen afterwards by cutting." },

// ═══════════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════════
const app = document.getElementById('app');
let mode = 'menu';   // 'menu' | 'flashcards-setup' | 'flashcards' | 'exam-setup' | 'exam' | 'exam-result'
let allowCalc = false;
let selectedTopics = new Set();
let selectedLength = 25;
let examQuestions = [];
let examAnswers = {};
let examStartTime = null;

// flashcards state
let flashFilteredCards = [];
let flashIdx = 0;

const ALL_TOPICS = [...new Set(FLASHCARDS.map(c => c.topic).concat(QUESTIONS.map(q => q.topic)))];

// ═══════════════════════════════════════════════════════════════
// RENDER FUNCTIONS
// ═══════════════════════════════════════════════════════════════
function render() {
  if (mode === 'menu') renderMenu();
  else if (mode === 'flashcards-setup') renderFlashcardsSetup();
  else if (mode === 'flashcards') renderFlashcards();
  else if (mode === 'exam-setup') renderExamSetup();
  else if (mode === 'exam') renderExam();
  else if (mode === 'exam-result') renderExamResult();
}

// ─── MENU ────────────────────────────────────────────────────
function renderMenu() {
  app.innerHTML = `
    <div class="menu">
      <div class="menu-card" onclick="setMode('flashcards-setup')">
        <div class="menu-icon">📇</div>
        <div class="menu-title">Flashcards</div>
        <div class="menu-desc">Memorize concepts and definitions at your own pace.</div>
      </div>
      <div class="menu-card" onclick="setMode('exam-setup', false)">
        <div class="menu-icon">📝</div>
        <div class="menu-title">Exam (no calculations)</div>
        <div class="menu-desc">Multiple-choice, single-choice, true/false and concept check.</div>
      </div>
      <div class="menu-card" onclick="setMode('exam-setup', true)">
        <div class="menu-icon">🧮</div>
        <div class="menu-title">Exam (with calculations)</div>
        <div class="menu-desc">Includes calculation tasks (Confusion Matrix, MAE/RMSE, distances, etc.).</div>
      </div>
    </div>
  `;
}

function setMode(newMode, withCalc) {
  mode = newMode;
  if (newMode === 'exam-setup') {
    allowCalc = withCalc;
  }
  selectedTopics = new Set(ALL_TOPICS);
  selectedLength = 25;
  render();
}

function backToMenu() {
  mode = 'menu';
  render();
}

// ─── FLASHCARDS SETUP ───────────────────────────────────────
function renderFlashcardsSetup() {
  const topicChips = ALL_TOPICS.map(t => 
    `<div class="topic-chip ${selectedTopics.has(t) ? 'selected' : ''}" onclick="toggleTopic('${t}')">${t}</div>`
  ).join('');
  
  app.innerHTML = `
    <button class="back-btn" onclick="backToMenu()">← Back to menu</button>
    <div class="setup-card">
      <div class="setup-title">📇 Flashcards – Select topics</div>
      <div class="setup-section">
        <div class="setup-section-label">Topics (click to toggle):</div>
        <div class="topic-grid">${topicChips}</div>
        <div style="margin-top:8px;">
          <button class="topic-chip" onclick="selectAllTopics()">Select all</button>
          <button class="topic-chip" onclick="clearTopics()">Clear all</button>
        </div>
      </div>
      <button class="start-btn" onclick="startFlashcards()" ${selectedTopics.size === 0 ? 'disabled' : ''}>
        Start (${countFilteredFlashcards()} cards)
      </button>
    </div>
  `;
}

function toggleTopic(topic) {
  if (selectedTopics.has(topic)) selectedTopics.delete(topic);
  else selectedTopics.add(topic);
  render();
}

function selectAllTopics() {
  selectedTopics = new Set(ALL_TOPICS);
  render();
}

function clearTopics() {
  selectedTopics = new Set();
  render();
}

function countFilteredFlashcards() {
  return FLASHCARDS.filter(c => selectedTopics.has(c.topic)).length;
}

function startFlashcards() {
  flashFilteredCards = FLASHCARDS.filter(c => selectedTopics.has(c.topic));
  // shuffle
  flashFilteredCards = shuffle([...flashFilteredCards]);
  flashIdx = 0;
  mode = 'flashcards';
  render();
}

// ─── FLASHCARDS ──────────────────────────────────────────────
function renderFlashcards() {
  if (flashFilteredCards.length === 0) {
    app.innerHTML = `<button class="back-btn" onclick="backToMenu()">← Back to menu</button>
      <div class="setup-card">No flashcards in this selection.</div>`;
    return;
  }
  const card = flashFilteredCards[flashIdx];
  const progressPct = (flashIdx + 1) / flashFilteredCards.length * 100;
  
  app.innerHTML = `
    <button class="back-btn" onclick="backToMenu()">← Back to menu</button>
    <div class="controls-bar">
      <div class="stats">Card <span>${flashIdx + 1}</span> / <span>${flashFilteredCards.length}</span></div>
      <div style="font-size:12px; color:#999;">${card.topic}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    <div class="card-area">
      <div class="flashcard" id="flip-card" onclick="flipFlashcard()">
        <div class="card-face card-front">
          <span class="card-tag">${card.topic}</span>
          <div class="card-question">${card.q}</div>
          <div class="card-hint">Click the card or press SPACE to reveal the answer</div>
        </div>
        <div class="card-face card-back">
          <span class="card-tag">${card.topic} – Answer</span>
          <div class="card-answer">${card.a}</div>
        </div>
      </div>
    </div>
    <div class="nav-buttons">
      <button class="nav-btn btn-prev" onclick="prevFlashcard()" ${flashIdx === 0 ? 'disabled' : ''}>← Previous</button>
      <button class="nav-btn btn-flip" onclick="flipFlashcard()">Reveal answer</button>
      <button class="nav-btn btn-next" onclick="nextFlashcard()" ${flashIdx === flashFilteredCards.length - 1 ? 'disabled' : ''}>Next →</button>
    </div>
  `;
}

function flipFlashcard() {
  const c = document.getElementById('flip-card');
  if (c) c.classList.toggle('flipped');
}

function prevFlashcard() {
  if (flashIdx > 0) { flashIdx--; render(); }
}

function nextFlashcard() {
  if (flashIdx < flashFilteredCards.length - 1) { flashIdx++; render(); }
}

// ─── EXAM SETUP ──────────────────────────────────────────────
function renderExamSetup() {
  const topicChips = ALL_TOPICS.map(t => {
    const count = QUESTIONS.filter(q => q.topic === t && (allowCalc || !q.calc)).length;
    return `<div class="topic-chip ${selectedTopics.has(t) ? 'selected' : ''}" onclick="toggleTopic('${t}')">${t} <span style="opacity:0.7;font-size:10px;">(${count})</span></div>`;
  }).join('');
  
  const totalAvailable = QUESTIONS.filter(q => 
    selectedTopics.has(q.topic) && (allowCalc || !q.calc)
  ).length;
  
  app.innerHTML = `
    <button class="back-btn" onclick="backToMenu()">← Back to menu</button>
    <div class="setup-card">
      <div class="setup-title">📝 Exam ${allowCalc ? '(with calculations)' : '(no calculations)'} – Configure</div>
      
      <div class="setup-section">
        <div class="setup-section-label">Topics:</div>
        <div class="topic-grid">${topicChips}</div>
        <div style="margin-top:8px;">
          <button class="topic-chip" onclick="selectAllTopics()">Select all</button>
          <button class="topic-chip" onclick="clearTopics()">Clear all</button>
        </div>
      </div>
      
      <div class="setup-section">
        <div class="setup-section-label">Exam length:</div>
        <div class="length-buttons">
          ${[10, 15, 25, 40].map(n => 
            `<button class="length-btn ${selectedLength === n ? 'active' : ''}" onclick="setLength(${n})">${n} questions</button>`
          ).join('')}
        </div>
        <div style="font-size:12px; color:#999; margin-top:8px;">
          ${totalAvailable} questions available in this selection · max ${Math.min(selectedLength, totalAvailable)} will be drawn
        </div>
      </div>
      
      <button class="start-btn" onclick="startExam()" ${selectedTopics.size === 0 || totalAvailable === 0 ? 'disabled' : ''}>
        Start exam (${Math.min(selectedLength, totalAvailable)} questions)
      </button>
    </div>
  `;
}

function setLength(n) {
  selectedLength = n;
  render();
}

function startExam() {
  let pool = QUESTIONS.filter(q => 
    selectedTopics.has(q.topic) && (allowCalc || !q.calc)
  );
  pool = shuffle([...pool]);
  examQuestions = pool.slice(0, selectedLength);
  // Group by type for cleaner exam structure: single -> multi -> tf -> calc -> concept
  const order = { single: 0, multi: 1, tf: 2, calc: 3, concept: 4 };
  examQuestions.sort((a, b) => order[a.type] - order[b.type]);
  examAnswers = {};
  examStartTime = Date.now();
  mode = 'exam';
  render();
}

// ─── EXAM ────────────────────────────────────────────────────
function renderExam() {
  if (examQuestions.length === 0) {
    app.innerHTML = '<div class="setup-card">No questions in selection.</div>';
    return;
  }
  
  let html = `
    <button class="back-btn" onclick="confirmAbortExam()">← Abort exam</button>
    <div class="controls-bar">
      <div class="stats">Exam: <span>${examQuestions.length}</span> questions</div>
      <div style="font-size:12px; color:#999;">${allowCalc ? 'With calculations' : 'No calculations'}</div>
    </div>
  `;
  
  examQuestions.forEach((q, i) => {
    const typeLabel = {single: 'Single Choice', multi: 'Multiple Choice', tf: 'True / False', concept: 'Concept Check', calc: 'Calculation'}[q.type];
    
    html += `<div class="exam-question">
      <div class="q-header">
        <span class="q-num">Q${i + 1}</span>
        <span class="q-type">${typeLabel}</span>
        <span class="q-topic">${q.topic}</span>
      </div>
      <div class="q-text">${q.q}</div>`;
    
    if (q.type === 'single') {
      html += '<ul class="q-options">';
      q.options.forEach((opt, idx) => {
        const checked = examAnswers[i] === idx;
        html += `<li><label class="${checked ? 'selected' : ''}">
          <input type="radio" name="q${i}" ${checked ? 'checked' : ''} onchange="setAnswer(${i}, ${idx})">
          <span>${String.fromCharCode(97 + idx)}) ${opt}</span>
        </label></li>`;
      });
      html += '</ul>';
    }
    else if (q.type === 'multi') {
      const sel = examAnswers[i] || [];
      html += '<ul class="q-options">';
      q.options.forEach((opt, idx) => {
        const checked = sel.includes(idx);
        html += `<li><label class="${checked ? 'selected' : ''}">
          <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleMultiAnswer(${i}, ${idx})">
          <span>${String.fromCharCode(97 + idx)}) ${opt}</span>
        </label></li>`;
      });
      html += '</ul>';
    }
    else if (q.type === 'tf') {
      const ans = examAnswers[i];
      html += `<ul class="q-options">
        <li><label class="${ans === true ? 'selected' : ''}">
          <input type="radio" name="q${i}" ${ans === true ? 'checked' : ''} onchange="setAnswer(${i}, true)">
          <span>True</span>
        </label></li>
        <li><label class="${ans === false ? 'selected' : ''}">
          <input type="radio" name="q${i}" ${ans === false ? 'checked' : ''} onchange="setAnswer(${i}, false)">
          <span>False</span>
        </label></li>
      </ul>`;
    }
    else if (q.type === 'concept') {
      const txt = examAnswers[i] || '';
      html += `<textarea class="q-textarea" placeholder="Your short answer..." 
                 oninput="setAnswer(${i}, this.value)">${escapeHtml(txt)}</textarea>`;
    }
    else if (q.type === 'calc') {
      const val = examAnswers[i] !== undefined ? examAnswers[i] : '';
      html += `<div class="calc-hint">Numeric answer · accept decimal (e.g. 0.75) or integer · tolerance ≈ ±0.05.</div>
        <input type="number" step="any" class="q-input" placeholder="Your answer" 
               value="${val}" oninput="setAnswer(${i}, parseFloat(this.value))">`;
    }
    
    html += '</div>';
  });
  
  html += `<button class="submit-btn" onclick="submitExam()">Submit exam &amp; see results</button>`;
  app.innerHTML = html;
}

function setAnswer(idx, val) {
  examAnswers[idx] = val;
}

function toggleMultiAnswer(idx, optIdx) {
  if (!examAnswers[idx]) examAnswers[idx] = [];
  const arr = examAnswers[idx];
  if (arr.includes(optIdx)) {
    examAnswers[idx] = arr.filter(i => i !== optIdx);
  } else {
    arr.push(optIdx);
    arr.sort();
  }
  render();
}

function confirmAbortExam() {
  if (confirm('Abort the current exam? Progress will be lost.')) {
    backToMenu();
  }
}

// ─── EXAM RESULT ─────────────────────────────────────────────
function submitExam() {
  mode = 'exam-result';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function gradeQuestion(q, ans) {
  if (q.type === 'single') {
    if (ans === undefined) return { auto: true, correct: false, points: 0 };
    return { auto: true, correct: q.correct.includes(ans), points: q.correct.includes(ans) ? 1 : 0 };
  }
  if (q.type === 'multi') {
    if (!ans || ans.length === 0) return { auto: true, correct: false, points: 0 };
    const correctSet = new Set(q.correct);
    const userSet = new Set(ans);
    if (correctSet.size === userSet.size && [...correctSet].every(x => userSet.has(x))) {
      return { auto: true, correct: true, points: 1 };
    }
    return { auto: true, correct: false, points: 0 };
  }
  if (q.type === 'tf') {
    if (ans === undefined) return { auto: true, correct: false, points: 0 };
    return { auto: true, correct: ans === q.correct, points: ans === q.correct ? 1 : 0 };
  }
  if (q.type === 'calc') {
    if (ans === undefined || isNaN(ans)) return { auto: true, correct: false, points: 0 };
    const diff = Math.abs(ans - q.answer_value);
    const correct = diff <= q.tolerance;
    return { auto: true, correct, points: correct ? 1 : 0 };
  }
  if (q.type === 'concept') {
    return { auto: false, correct: null, points: 0, hasAnswer: !!(ans && ans.trim()) };
  }
  return { auto: true, correct: false, points: 0 };
}

function renderExamResult() {
  let autoTotal = 0, autoCorrect = 0, conceptCount = 0, conceptAnswered = 0;
  const results = examQuestions.map((q, i) => {
    const r = gradeQuestion(q, examAnswers[i]);
    if (r.auto) {
      autoTotal++;
      if (r.correct) autoCorrect++;
    } else {
      conceptCount++;
      if (r.hasAnswer) conceptAnswered++;
    }
    return r;
  });
  
  const pct = autoTotal > 0 ? Math.round(autoCorrect / autoTotal * 100) : 0;
  const grade = pct >= 95 ? '1.0' : pct >= 90 ? '1.3' : pct >= 85 ? '1.7' : pct >= 80 ? '2.0' : pct >= 75 ? '2.3' : pct >= 70 ? '2.7' : pct >= 65 ? '3.0' : pct >= 60 ? '3.3' : pct >= 50 ? '4.0' : '5.0';
  
  let feedback = '';
  if (pct >= 90) feedback = '🎉 Excellent! You have a very strong grasp of the material.';
  else if (pct >= 80) feedback = '👍 Solid result. A few concepts could be tightened up, but you are well prepared.';
  else if (pct >= 70) feedback = '📘 Good baseline. Review the questions you missed below — they show where to focus.';
  else if (pct >= 60) feedback = '🔍 Workable result, but several gaps remain. Go through the explanations carefully.';
  else feedback = '⚠️ Time to revisit the basics. Use the explanations below as a study guide.';
  
  let html = `
    <button class="back-btn" onclick="backToMenu()">← Back to menu</button>
    <div class="result-banner">
      <div class="result-score">${autoCorrect} / ${autoTotal}</div>
      <div class="result-grade">${pct}% · Grade ≈ ${grade}</div>
      ${conceptCount > 0 ? `<div class="result-subscore">+ ${conceptAnswered} / ${conceptCount} concept check questions answered (self-evaluation below)</div>` : ''}
      <div class="result-feedback">${feedback}</div>
    </div>
    
    <div class="action-buttons">
      <button class="action-btn primary" onclick="openExport()">📤 Send to Claude for feedback</button>
      <button class="action-btn" onclick="startExam()">🔄 New exam (same settings)</button>
      <button class="action-btn" onclick="backToMenu()">🏠 Main menu</button>
    </div>
    
    <h3 style="margin: 20px 0 12px; color: #4a7c2a;">📋 Review</h3>
  `;
  
  examQuestions.forEach((q, i) => {
    const r = results[i];
    const typeLabel = {single: 'Single Choice', multi: 'Multiple Choice', tf: 'True / False', concept: 'Concept Check', calc: 'Calculation'}[q.type];
    let icon, marker;
    if (!r.auto) { icon = '📝'; marker = '<span style="color:#8a6d1a">Self-evaluate</span>'; }
    else if (r.correct) { icon = '✅'; marker = '<span class="correct-marker">Correct</span>'; }
    else { icon = '❌'; marker = '<span class="wrong-marker">Incorrect</span>'; }
    
    html += `<div class="review-question">
      <div class="review-header">
        <span class="check-icon">${icon}</span>
        <span class="q-num">Q${i + 1}</span>
        <span class="q-type">${typeLabel}</span>
        <span class="q-topic">· ${q.topic}</span>
        <span style="margin-left:auto;">${marker}</span>
      </div>
      <div class="q-text">${q.q}</div>`;
    
    // Show options with markers
    if (q.type === 'single') {
      const ans = examAnswers[i];
      html += '<ul class="q-options">';
      q.options.forEach((opt, idx) => {
        let cls = '';
        if (q.correct.includes(idx)) cls = 'correct-answer';
        else if (ans === idx) cls = 'wrong-answer';
        html += `<li><label class="${cls}"><span>${String.fromCharCode(97 + idx)}) ${opt}</span></label></li>`;
      });
      html += '</ul>';
    }
    else if (q.type === 'multi') {
      const ans = examAnswers[i] || [];
      html += '<ul class="q-options">';
      q.options.forEach((opt, idx) => {
        let cls = '';
        if (q.correct.includes(idx) && ans.includes(idx)) cls = 'correct-answer';
        else if (q.correct.includes(idx) && !ans.includes(idx)) cls = 'correct-answer';
        else if (!q.correct.includes(idx) && ans.includes(idx)) cls = 'wrong-answer';
        html += `<li><label class="${cls}"><span>${String.fromCharCode(97 + idx)}) ${opt}</span></label></li>`;
      });
      html += '</ul>';
    }
    else if (q.type === 'tf') {
      const ans = examAnswers[i];
      html += `<div class="your-answer">Correct answer: <strong>${q.correct ? 'True' : 'False'}</strong> · Your answer: <strong>${ans === undefined ? '–' : (ans ? 'True' : 'False')}</strong></div>`;
    }
    else if (q.type === 'calc') {
      const ans = examAnswers[i];
      html += `<div class="your-answer">Correct answer: <strong>${q.answer_value}</strong> · Your answer: <strong>${ans !== undefined && !isNaN(ans) ? ans : '–'}</strong></div>`;
    }
    else if (q.type === 'concept') {
      const ans = examAnswers[i] || '<em>(no answer)</em>';
      html += `<div class="your-answer"><strong>Your answer:</strong><br>${escapeHtml(ans)}</div>`;
      html += `<div class="review-explain"><strong>Sample answer:</strong> ${q.answer}</div>`;
      return html;
    }
    
    html += `<div class="review-explain"><strong>Explanation:</strong> ${q.explain || ''}</div></div>`;
  });
  
  app.innerHTML = html;
}

// ─── EXPORT ──────────────────────────────────────────────────
function openExport() {
  const lines = [];
  lines.push('=== Business AI Exam Results ===');
  lines.push('Topics: ' + [...selectedTopics].join(', '));
  lines.push('Mode: ' + (allowCalc ? 'with calculations' : 'no calculations'));
  lines.push('Length: ' + examQuestions.length + ' questions');
  lines.push('');
  
  examQuestions.forEach((q, i) => {
    const r = gradeQuestion(q, examAnswers[i]);
    const typeLabel = {single: 'Single Choice', multi: 'Multiple Choice', tf: 'True/False', concept: 'Concept Check', calc: 'Calculation'}[q.type];
    
    lines.push(`Q${i+1} [${typeLabel} · ${q.topic}]`);
    lines.push('Question: ' + q.q.replace(/<[^>]+>/g, ''));
    
    if (q.type === 'single') {
      lines.push('Options:');
      q.options.forEach((o, idx) => lines.push('  ' + String.fromCharCode(97+idx) + ') ' + o));
      lines.push('Correct: ' + q.correct.map(c => String.fromCharCode(97+c)).join(', '));
      lines.push('My answer: ' + (examAnswers[i] !== undefined ? String.fromCharCode(97+examAnswers[i]) : '–'));
    } else if (q.type === 'multi') {
      lines.push('Options:');
      q.options.forEach((o, idx) => lines.push('  ' + String.fromCharCode(97+idx) + ') ' + o));
      lines.push('Correct: ' + q.correct.map(c => String.fromCharCode(97+c)).join(', '));
      lines.push('My answer: ' + ((examAnswers[i] || []).map(c => String.fromCharCode(97+c)).join(', ') || '–'));
    } else if (q.type === 'tf') {
      lines.push('Correct: ' + (q.correct ? 'True' : 'False'));
      lines.push('My answer: ' + (examAnswers[i] === undefined ? '–' : (examAnswers[i] ? 'True' : 'False')));
    } else if (q.type === 'calc') {
      lines.push('Correct: ' + q.answer_value);
      lines.push('My answer: ' + (examAnswers[i] !== undefined && !isNaN(examAnswers[i]) ? examAnswers[i] : '–'));
    } else if (q.type === 'concept') {
      lines.push('My answer: ' + (examAnswers[i] || '(blank)'));
    }
    
    lines.push('Result: ' + (r.auto ? (r.correct ? '✓ correct' : '✗ wrong') : '(concept – self-evaluate)'));
    lines.push('');
  });
  
  lines.push('');
  lines.push('Please review my answers above and give me detailed feedback like in previous exams: highlight any mistakes, explain what I missed, give me a grade and tell me what to focus on next.');
  
  document.getElementById('export-text').value = lines.join('\n');
  document.getElementById('export-modal').classList.add('visible');
}

function closeExport() {
  document.getElementById('export-modal').classList.remove('visible');
}

function copyExport() {
  const t = document.getElementById('export-text');
  t.select();
  document.execCommand('copy');
  alert('Copied to clipboard! Paste it into your Claude chat.');
}

// ─── UTILITIES ───────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Keyboard for flashcards
document.addEventListener('keydown', (e) => {
  if (mode !== 'flashcards') return;
  if (e.key === 'ArrowLeft') prevFlashcard();
  else if (e.key === 'ArrowRight') nextFlashcard();
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipFlashcard(); }
});

// Init
render();
</script>
